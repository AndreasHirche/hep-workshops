<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SAP Agentic AI v3 – Discovery Center</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%230070f2'/><text x='16' y='22' font-family='system-ui' font-size='9' font-weight='900' fill='white' text-anchor='middle'>DC3</text></svg>">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#06070f;margin:0;padding:0}

.dc-header{width:100%;overflow:hidden;max-height:23vw;min-height:100px;line-height:0;
  box-shadow:0 4px 24px rgba(0,0,0,0.3)}
.dc-header img{width:100%;display:block;object-fit:cover;object-position:top}

.version-bar{background:#0f172a;border-bottom:1px solid #1e293b;
  display:flex;align-items:center;justify-content:space-between;padding:8px 20px;gap:12px}
.version-bar span{font-size:0.72rem;color:#475569}
.v-toggle{display:flex;gap:6px}
.v-btn{padding:4px 12px;border-radius:16px;font-size:0.7rem;font-weight:600;
  border:1px solid #334155;background:transparent;color:#64748b;
  cursor:pointer;transition:all .15s;text-decoration:none}
.v-btn.active{background:rgba(0,112,242,0.15);border-color:#0070f2;color:#60a5fa}
.v-btn:hover:not(.active){border-color:#475569;color:#94a3b8}

/* ── Diagram ── */
.diagram-wrap{position:relative;width:100%;line-height:0;background:#06070f;overflow:hidden;cursor:default}
.diagram-wrap img#main-img{width:100%;display:block}

/* ── Hotspot shell: invisible at rest, no pointer events ── */
.hs{
  position:absolute;
  pointer-events:none;
  overflow:hidden;               /* clips .hs-bg to the border-radius */
  transition:transform .26s cubic-bezier(0.34,1.56,0.64,1), filter .26s;
  z-index:1;
}
/* Inner background slice — opacity 0 until hovered */
.hs-bg{
  position:absolute;
  inset:0;
  background-image:url(Marc.png);
  background-repeat:no-repeat;
  background-size:100px 100px;  /* overwritten by JS */
  background-position:0 0;      /* overwritten by JS */
  opacity:0;
  transition:opacity .1s;
}
.hs.hovered .hs-bg{opacity:1}
.hs.hovered{
  transform:translateY(-10px) scale(1.07);
  filter:drop-shadow(0 18px 32px rgba(0,0,0,0.85)) drop-shadow(0 3px 8px rgba(0,0,0,0.6));
  z-index:30;
}

/* ── Debug mode (?debug in URL) ── */
.debug .hs{outline:1.5px solid rgba(255,80,80,0.85)}
.debug .hs-bg{opacity:0.35!important}
.debug .hs-label{display:block}
.hs-label{
  display:none;position:absolute;top:2px;left:3px;
  font-size:8px;line-height:1.2;color:#ff6;
  text-shadow:0 0 3px #000,0 0 6px #000;
  white-space:nowrap;pointer-events:none;z-index:2
}
#dbg-coords{
  display:none;position:fixed;bottom:12px;right:12px;z-index:9999;
  background:rgba(0,0,0,0.85);color:#4ade80;font:12px monospace;
  padding:6px 12px;border-radius:6px;border:1px solid #334155;
  pointer-events:none
}
.debug #dbg-coords{display:block}

/* ── Tooltip ── */
#tooltip{position:fixed;pointer-events:none;z-index:999;
  background:rgba(8,10,20,0.94);border:1px solid rgba(255,255,255,0.13);
  border-radius:7px;padding:5px 12px;font-size:0.72rem;color:#e2e8f0;
  white-space:nowrap;opacity:0;transition:opacity .12s;
  backdrop-filter:blur(10px);box-shadow:0 4px 16px rgba(0,0,0,0.5)}
</style>
</head>
<body>

<div class="dc-header"><img src="marc2.png" alt="SAP Discovery Center"></div>

<div class="version-bar">
  <span>SAP Agentic AI Architecture — hover to inspect · click to open in Discovery Center</span>
  <div class="v-toggle">
    <a class="v-btn" href="index.html">v1</a>
    <a class="v-btn" href="index-v2.html">v2</a>
    <span class="v-btn active">v3</span>
  </div>
</div>

<div class="diagram-wrap" id="diagram">
<img src="Marc.png" id="main-img" alt="SAP Agentic AI Architecture" draggable="false">

<!-- JOULE — circle -->
<a class="hs" data-l="46" data-t="2" data-w="9" data-h="12"
   style="left:46%;top:2%;width:9%;height:12%;border-radius:50%"
   href="https://discovery-center.cloud.sap/serviceCatalog/joule"
   target="_blank" rel="noopener" data-tip="Joule">
  <div class="hs-bg"></div><span class="hs-label">Joule</span></a>

<!-- PARTNER AGENTS — pill -->
<a class="hs" data-l="60" data-t="25.5" data-w="9" data-h="5"
   style="left:60%;top:25.5%;width:9%;height:5%;border-radius:9999px"
   href="https://discovery-center.cloud.sap/protected/index.html#/ai-catalog/"
   target="_blank" rel="noopener" data-tip="Partner Agents">
  <div class="hs-bg"></div><span class="hs-label">Partner Agents</span></a>

<!-- THIRD-PARTY AI AGENTS — pill -->
<a class="hs" data-l="79" data-t="25.5" data-w="10" data-h="5"
   style="left:79%;top:25.5%;width:10%;height:5%;border-radius:9999px"
   href="https://discovery-center.cloud.sap/search/?keyword=third+party+AI"
   target="_blank" rel="noopener" data-tip="Third-party AI Agents">
  <div class="hs-bg"></div><span class="hs-label">Third-party AI</span></a>

<!-- SAP INTEGRATION SUITE — pill (Build column) -->
<a class="hs" data-l="12" data-t="78" data-w="13.5" data-h="2.5"
   style="left:12%;top:78%;width:13.5%;height:2.5%;border-radius:9999px"
   href="https://discovery-center.cloud.sap/serviceCatalog/sap-integration-suite"
   target="_blank" rel="noopener" data-tip="SAP Integration Suite">
  <div class="hs-bg"></div><span class="hs-label">Integration Suite</span></a>

<!-- KNOWLEDGE GRAPH — pill -->
<a class="hs" data-l="43.25" data-t="61" data-w="12.95" data-h="3.25"
   style="left:43.25%;top:61%;width:12.95%;height:3.25%;border-radius:9999px"
   href="https://discovery-center.cloud.sap/search/?keyword=knowledge+graph"
   target="_blank" rel="noopener" data-tip="Knowledge Graph">
  <div class="hs-bg"></div><span class="hs-label">Knowledge Graph</span></a>

<!-- SAP BUSINESS DATA CLOUD — pill -->
<a class="hs" data-l="43.6" data-t="79" data-w="12.8" data-h="4"
   style="left:43.6%;top:79%;width:12.8%;height:4%;border-radius:9999px"
   href="https://discovery-center.cloud.sap/protected/index.html#/missionCatalog/?sortBy=relevance&category=dataanalytics"
   target="_blank" rel="noopener" data-tip="SAP Business Data Cloud">
  <div class="hs-bg"></div><span class="hs-label">Business Data Cloud</span></a>
</div><!-- /diagram-wrap -->

<div id="tooltip"></div>
<div id="dbg-coords">x: – y: –</div>

<script>
var diagram  = document.getElementById('diagram');
var mainImg  = document.getElementById('main-img');
var hotspots = Array.from(document.querySelectorAll('.hs'));
var tip      = document.getElementById('tooltip');
var dbgCoords= document.getElementById('dbg-coords');
var current  = null;
var isDebug  = /[?&]debug/.test(location.search);

if (isDebug) document.body.classList.add('debug');

/* ── Precompute bg slice for each hotspot ─────────────────────────── */
function updateBgs() {
  var W = mainImg.offsetWidth;
  var H = mainImg.offsetHeight;
  if (!W || !H) return;
  hotspots.forEach(function(el) {
    var l  = parseFloat(el.dataset.l) / 100;
    var t  = parseFloat(el.dataset.t) / 100;
    var bg = el.querySelector('.hs-bg');
    bg.style.backgroundSize     = W + 'px ' + H + 'px';
    bg.style.backgroundPosition = (-l * W) + 'px ' + (-t * H) + 'px';
  });
}
if (mainImg.complete) updateBgs();
mainImg.addEventListener('load', updateBgs);
window.addEventListener('resize', updateBgs);

/* ── Hit-test: smallest area wins on overlap ──────────────────────── */
function hitTest(mx, my) {
  var best = null, bestArea = Infinity;
  hotspots.forEach(function(el) {
    var l = parseFloat(el.dataset.l),  t = parseFloat(el.dataset.t);
    var w = parseFloat(el.dataset.w),  h = parseFloat(el.dataset.h);
    if (mx >= l && mx <= l + w && my >= t && my <= t + h) {
      var area = w * h;
      if (area < bestArea) { bestArea = area; best = el; }
    }
  });
  return best;
}

/* ── Container mousemove drives everything ────────────────────────── */
diagram.addEventListener('mousemove', function(e) {
  var rect = diagram.getBoundingClientRect();
  var W    = rect.width;
  var H    = mainImg.offsetHeight;
  var mx   = (e.clientX - rect.left) / W * 100;
  var my   = (e.clientY - rect.top)  / H * 100;

  if (isDebug) dbgCoords.textContent = 'x: ' + mx.toFixed(1) + '%   y: ' + my.toFixed(1) + '%';

  var hit = hitTest(mx, my);
  if (hit !== current) {
    if (current) current.classList.remove('hovered');
    current = hit;
    if (hit) {
      hit.classList.add('hovered');
      diagram.style.cursor = 'pointer';
      tip.textContent  = hit.dataset.tip;
      tip.style.opacity = '1';
    } else {
      diagram.style.cursor = 'default';
      tip.style.opacity = '0';
    }
  }
  if (hit) {
    tip.style.left = (e.clientX + 16) + 'px';
    tip.style.top  = (e.clientY - 40) + 'px';
  }
});

diagram.addEventListener('mouseleave', function() {
  if (current) { current.classList.remove('hovered'); current = null; }
  diagram.style.cursor = 'default';
  tip.style.opacity = '0';
});

diagram.addEventListener('click', function() {
  if (current) window.open(current.getAttribute('href'), '_blank', 'noopener');
});
</script>
</body>
</html>
