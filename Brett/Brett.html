<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Brett</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;overflow:hidden;user-select:none}

#video-wrap{position:relative;width:100vw;max-width:640px}
video{width:100%;display:block;border-radius:0}

/* Power meter overlay */
#meter-wrap{
  position:fixed;right:28px;top:50%;transform:translateY(-50%);
  display:flex;flex-direction:column;align-items:center;gap:8px;
  opacity:0;transition:opacity .15s;pointer-events:none;z-index:10;
}
#meter-wrap.visible{opacity:1}
#meter-track{
  width:28px;height:260px;
  background:rgba(255,255,255,0.1);border:2px solid rgba(255,255,255,0.25);
  border-radius:14px;overflow:hidden;position:relative;
}
#meter-fill{
  position:absolute;bottom:0;left:0;width:100%;height:0%;
  border-radius:12px;
  background:linear-gradient(to top,#22c55e,#eab308,#ef4444);
  transition:none;
}
#meter-label{
  font-family:system-ui,sans-serif;font-size:1.6rem;font-weight:900;
  color:#fff;text-shadow:0 2px 8px rgba(0,0,0,0.8);min-width:28px;text-align:center;
}

/* Loading spinner */
#loader{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,0.55);z-index:5;
  transition:opacity .25s;
}
#loader.hidden{opacity:0;pointer-events:none}
#loader-ring{
  width:42px;height:42px;
  border:3px solid rgba(255,255,255,0.15);
  border-top-color:rgba(255,255,255,0.85);
  border-radius:50%;
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* Hint */
#hint{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  font-family:system-ui,sans-serif;font-size:0.8rem;color:rgba(255,255,255,0.45);
  letter-spacing:0.06em;text-align:center;pointer-events:none;
  transition:opacity .4s;
}

/* Result flash */
#result-flash{
  position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  font-family:system-ui,sans-serif;font-size:4rem;font-weight:900;color:#fff;
  text-shadow:0 4px 20px rgba(0,0,0,0.9);
  opacity:0;pointer-events:none;z-index:20;
  transition:opacity .3s;
}
</style>
</head>
<body>

<div id="video-wrap">
  <video id="vid" playsinline preload="auto" src="Brett0.mp4"></video>
  <div id="loader"><div id="loader-ring"></div></div>
</div>

<div id="meter-wrap">
  <div id="meter-label">—</div>
  <div id="meter-track"><div id="meter-fill"></div></div>
</div>

<div id="hint">Drücken &amp; halten</div>
<div id="result-flash"></div>

<script>
var vid       = document.getElementById('vid');
var loader    = document.getElementById('loader');
var wrap      = document.getElementById('meter-wrap');
var fill      = document.getElementById('meter-fill');
var label     = document.getElementById('meter-label');
var hint      = document.getElementById('hint');
var flash     = document.getElementById('result-flash');

// Videos per score bucket
var VIDEOS = {
  '1': 'Brett0.mp4',
  '2': 'Brett0.mp4',
  '3': 'Brett1.mp4',
  '4': 'Brett1.mp4',
  '5': 'Brett2.mp4'
};

// Meter animation
var DURATION = 900;   // ms for one full up-swing
var RAF_ID   = null;
var startTime = null;
var pressing  = false;

function meterValue(t) {
  // Goes 0→1 (up), then 1→0 (down), then repeats → triangle wave
  var phase = (t % (DURATION * 2)) / (DURATION * 2);
  if (phase < 0.5) return phase * 2;        // rising
  return (1 - phase) * 2;                    // falling
}

function toScore(pct) {
  // pct: 0..1   score: 1..5
  if (pct < 0.2) return 1;
  if (pct < 0.4) return 2;
  if (pct < 0.6) return 3;
  if (pct < 0.8) return 4;
  return 5;
}

function scoreColor(s) {
  if (s <= 2) return '#22c55e';
  if (s <= 4) return '#eab308';
  return '#ef4444';
}

function animateMeter(ts) {
  if (!pressing) return;
  if (!startTime) startTime = ts;
  var elapsed = ts - startTime;
  var pct = meterValue(elapsed);
  fill.style.height = (pct * 100) + '%';
  var sc = toScore(pct);
  label.textContent = sc;
  label.style.color = scoreColor(sc);
  RAF_ID = requestAnimationFrame(animateMeter);
}

function startPress(e) {
  if (e.type === 'touchstart') e.preventDefault();
  if (pressing) return;
  pressing  = true;
  startTime = null;
  wrap.classList.add('visible');
  hint.style.opacity = '0';
  vid.pause();
  RAF_ID = requestAnimationFrame(animateMeter);
}

function endPress(e) {
  if (e.type === 'touchend' || e.type === 'touchcancel') e.preventDefault();
  if (!pressing) return;
  pressing = false;
  cancelAnimationFrame(RAF_ID);

  // Read current meter position
  var pct = parseFloat(fill.style.height) / 100 || 0;
  var score = toScore(pct);
  var videoFile = VIDEOS[String(score)];

  // Hide meter
  wrap.classList.remove('visible');
  fill.style.height = '0%';
  label.textContent = '—';

  // Flash score
  flash.textContent = score;
  flash.style.color = scoreColor(score);
  flash.style.opacity = '1';
  setTimeout(function() { flash.style.opacity = '0'; }, 800);

  // Load and play the right video
  if (vid.getAttribute('src') !== videoFile) {
    loader.classList.remove('hidden');
    vid.src = videoFile;
    vid.load();
  }
  vid.currentTime = 0;
  vid.play();
}

// Mouse events
document.addEventListener('mousedown', startPress);
document.addEventListener('mouseup',   endPress);

// Touch events
document.addEventListener('touchstart', startPress, {passive: false});
document.addEventListener('touchend',   endPress,   {passive: false});
document.addEventListener('touchcancel',endPress,   {passive: false});

// Hide loader once first frame is ready
vid.addEventListener('canplay', function() { loader.classList.add('hidden'); });

// Pause video when it ends, show hint again
vid.addEventListener('ended', function() {
  vid.pause();
  vid.currentTime = 0;
  hint.style.opacity = '1';
});

// Initial state: paused at frame 0
vid.pause();
</script>
</body>
</html>
