<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SAP Custom AI Hands-on Palo Alto</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 20'><rect width='40' height='20' fill='%232563eb'/><text x='20' y='15' font-family='Arial' font-size='14' font-weight='900' fill='white' text-anchor='middle' letter-spacing='1'>HEP</text></svg>">
<style>
@font-face{font-family:'72';src:url('https://ui5.sap.com/resources/sap/ui/core/themes/sap_fiori_3/fonts/72-Regular.woff2') format('woff2');font-weight:400}
@font-face{font-family:'72';src:url('https://ui5.sap.com/resources/sap/ui/core/themes/sap_fiori_3/fonts/72-Bold.woff2') format('woff2');font-weight:700}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'72',Arial,Helvetica,sans-serif;background:#f5f6f7;color:#32363a;font-size:14px;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 16px}
.card{background:#fff;border:1px solid #e8ebee;border-radius:8px;padding:32px 40px;max-width:480px;width:100%;box-shadow:0 2px 12px rgba(0,0,0,.07)}
h1{font-size:1.25rem;font-weight:700;color:#1d2d3e;margin-bottom:6px}
.sub{color:#74777a;font-size:.85rem;margin-bottom:28px}
.links{display:flex;flex-direction:column;gap:10px}
a.tile{display:flex;align-items:center;gap:14px;padding:14px 16px;border:1px solid #e8ebee;border-radius:6px;text-decoration:none;color:#1d2d3e;transition:border-color .15s,box-shadow .15s;background:#fafafa}
a.tile:hover{border-color:#0064d9;box-shadow:0 2px 8px rgba(0,100,217,.1);background:#fff}
.tile-icon{width:36px;height:36px;border-radius:6px;background:#f1ecff;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tile-icon svg{width:18px;height:18px;color:#7c3aed}
.tile-label{font-weight:700;font-size:.875rem}
.tile-desc{font-size:.75rem;color:#74777a;margin-top:2px}
.badge-new{display:inline-block;margin-left:8px;padding:1px 7px;border-radius:10px;background:#dcf5e5;color:#0d6e35;font-size:.65rem;font-weight:700;vertical-align:middle}
footer{margin-top:24px;font-size:.72rem;color:#a9adb1}
</style>
</head>
<body>
<div class="card">
  <h1>SAP Custom AI Hands-on · Palo Alto</h1>
  <p class="sub">Workshop materials &amp; session overview</p>
  <div class="links">
    <a class="tile" href="Wission3.html">
      <div class="tile-icon">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="3" width="16" height="14" rx="2"/>
          <path d="M6 7h8M6 10h5M6 13h3"/>
        </svg>
      </div>
      <div>
        <div class="tile-label">Wission Board <span class="badge-new">latest</span></div>
        <div class="tile-desc">Session timeline &amp; mission tracker (v3)</div>
      </div>
    </a>
    <a class="tile" href="Wission2.html">
      <div class="tile-icon">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="3" width="16" height="14" rx="2"/>
          <path d="M6 7h8M6 10h5M6 13h3"/>
        </svg>
      </div>
      <div>
        <div class="tile-label">Wission Board v2</div>
        <div class="tile-desc">Session timeline &amp; mission tracker (v2)</div>
      </div>
    </a>
    <a class="tile" href="agenda.html">
      <div class="tile-icon">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="2" width="14" height="16" rx="2"/>
          <path d="M7 2v4M13 2v4M3 8h14"/>
        </svg>
      </div>
      <div>
        <div class="tile-label">Agenda</div>
        <div class="tile-desc">Full 3-day session overview</div>
      </div>
    </a>
  </div>
</div>
<footer>SAP HEP Workshop · Internal use only</footer>
</body>
</html>
