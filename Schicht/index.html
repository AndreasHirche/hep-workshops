<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%23dc2626'/><text x='16' y='23' font-family='Inter,system-ui,sans-serif' font-size='20' font-weight='900' fill='white' text-anchor='middle'>t</text></svg>">
<title>Schichtplan</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0f1117;--surface:#1a1d27;--border:#2a2d3a;--text:#e2e8f0;--muted:#64748b;
  --si:#3b82f6;--ma:#f97316;--sa:#22c55e;
}
@media(prefers-color-scheme:light){
  :root:not([data-theme]){
    --bg:#f8fafc;--surface:#ffffff;--border:#e2e8f0;--text:#0f172a;--muted:#64748b;
  }
}
[data-theme="light"]{
  --bg:#f8fafc;--surface:#ffffff;--border:#e2e8f0;--text:#0f172a;--muted:#64748b;
}
[data-theme="dark"]{
  --bg:#0f1117;--surface:#1a1d27;--border:#2a2d3a;--text:#e2e8f0;--muted:#64748b;
}
html,body{height:100%;overflow:hidden;font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:18px}

/* ── APP ── */
.app{display:flex;flex-direction:column;height:100dvh;overflow:hidden}
.topbar{display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;
  padding:7px 10px 6px;background:var(--surface);border-bottom:1px solid var(--border);
  flex-shrink:0;gap:6px}
.topbar-nav{display:flex;align-items:center;gap:6px;order:1}
.nav-btn{padding:7px 12px;border-radius:8px;border:1px solid var(--border);
  background:rgba(255,255,255,0.05);color:var(--text);font-size:.95rem;font-weight:600;
  cursor:pointer;white-space:nowrap}
.nav-btn:active{background:rgba(255,255,255,0.14)}
.month-title{font-size:1.1rem;font-weight:700;white-space:nowrap;min-width:110px;text-align:center}
.topbar-actions{display:flex;gap:5px;order:2;flex-wrap:wrap}
.icon-btn{width:36px;height:36px;border-radius:8px;border:1px solid var(--border);
  background:rgba(255,255,255,0.05);color:var(--text);font-size:1.1rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center}
.icon-btn:active{background:rgba(255,255,255,0.14)}

/* ── CALENDAR ── */
.cal-wrap{flex:1;overflow-y:auto;padding:4px 3px 4px;
  scrollbar-width:thin;scrollbar-color:rgba(255,255,255,0.1) transparent}
.cal-header{display:grid;grid-template-columns:repeat(6,1fr);gap:2px;margin-bottom:4px}
.cal-header span{text-align:center;font-size:.88rem;font-weight:700;color:var(--muted);
  text-transform:uppercase;padding:3px 0}
.cal-header .hd-sun{color:#888}
.month-summary{display:flex;gap:6px;padding:5px 3px 2px;flex-shrink:0;flex-wrap:wrap}
.ms-chip{display:flex;flex-direction:column;align-items:center;flex:1;min-width:0;
  padding:5px 4px;border-radius:8px;background:var(--surface);border:1px solid var(--border)}
.ms-name{font-size:.6rem;font-weight:700;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.ms-hours{font-size:.88rem;font-weight:800;line-height:1.2}
.ms-delta{font-size:.65rem;font-weight:700}
.ms-pos{color:#22c55e}
.ms-neg{color:#ef4444}
.ms-zero{color:var(--muted)}
.cal-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:2px}
.day-cell{background:var(--surface);border-radius:6px;padding:4px;
  border:1px solid var(--border);cursor:pointer;min-height:80px;position:relative}
.day-cell:active{background:rgba(255,255,255,0.07)}
.day-cell.empty{background:transparent;border-color:transparent;cursor:default}
.day-cell.sun{display:none}
.day-cell.today .day-num{background:var(--si);color:#fff;border-radius:50%}
.day-num{font-size:1rem;font-weight:700;color:var(--text);margin-bottom:3px;
  width:24px;height:24px;display:flex;align-items:center;justify-content:center}
.day-cell.sun .day-num{color:#888}
.day-cell.sat .day-num{color:#94a3b8}
.day-cell.holiday{border:2px solid rgba(120,120,120,0.55)}
[data-theme="light"] .day-cell.holiday{border-color:rgba(80,80,80,0.5)}
@media(prefers-color-scheme:light){:root:not([data-theme]) .day-cell.holiday{border-color:rgba(80,80,80,0.5)}}
.shift-rows{display:flex;flex-direction:column;gap:1px}
.shift-row{display:flex;align-items:center;gap:2px;min-height:14px}
.shift-lbl{font-size:.68rem;color:var(--muted);width:18px;flex-shrink:0;line-height:1.3;font-weight:600}
.shift-persons{display:flex;gap:1px}
.person-chip{font-size:.75rem;font-weight:800;line-height:1.3;padding:1px 4px;border-radius:3px;color:#fff}
.person-chip.grey{background:#374151!important;color:#9ca3af}
/* Urlaub/frei full-width bars */
.shift-row.urlaub-row{background:rgba(200,200,200,0.12);border-radius:3px;padding:1px 2px;width:100%}
.shift-row.frei-row{background:rgba(80,80,80,0.35);border-radius:3px;padding:1px 2px;width:100%}
.uf-bar{display:flex;align-items:center;width:100%;gap:2px}
.uf-chip{font-size:.62rem;font-weight:800;line-height:1.2;padding:1px 3px;border-radius:3px;color:#fff}
.uf-chip.urlaub{background:rgba(150,150,150,0.5);color:#d1d5db}
.uf-chip.frei{background:rgba(55,65,81,0.9);color:#9ca3af}
/* Connected Urlaub bar styles */
.shift-row.urlaub-band{outline:2px solid rgba(180,180,180,0.6);outline-offset:-1px;border-radius:3px}
.shift-row.band-start{border-radius:3px 0 0 3px;outline-right-color:transparent}
.shift-row.band-mid{border-radius:0;outline-left-color:transparent;outline-right-color:transparent}
.shift-row.band-end{border-radius:0 3px 3px 0;outline-left-color:transparent}

/* time rows in calendar */
.shift-row.time-row .shift-lbl{color:#64748b;font-size:.55rem;font-weight:400}

/* ── BOTTOM SHEET ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:100;
  display:flex;align-items:flex-end;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .2s}
.overlay.show{opacity:1;pointer-events:all}
.sheet{background:var(--surface);border-radius:18px 18px 0 0;width:100%;max-width:520px;
  padding:14px 14px 28px;transform:translateY(100%);transition:transform .25s ease;
  max-height:90dvh;overflow-y:auto}
.overlay.show .sheet{transform:translateY(0)}
.sheet-header{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:12px}
.sheet-title{font-size:1rem;font-weight:700;color:var(--text);text-align:center;flex:1}
.sheet-title span{color:var(--muted);font-weight:400;font-size:.82rem;margin-left:6px}
.day-nav-btns{display:flex;gap:6px}
.day-nav-btn{padding:5px 12px;border-radius:7px;border:1px solid var(--border);
  background:rgba(255,255,255,0.05);color:var(--text);font-size:.78rem;font-weight:600;cursor:pointer}
.day-nav-btn:active{background:rgba(255,255,255,0.12)}

/* Entry grid */
.entry-grid{display:grid;grid-template-columns:64px 1fr 1fr 1fr;gap:4px;margin-bottom:12px}
.entry-section-uf{grid-column:1/-1;background:rgba(128,128,128,0.08);border:1px solid rgba(128,128,128,0.18);
  border-radius:10px;padding:8px 8px 6px;margin-bottom:4px;display:grid;
  grid-template-columns:64px 1fr 1fr 1fr;gap:4px}
.entry-section-shifts{grid-column:1/-1;background:rgba(59,130,246,0.06);border:1px solid rgba(59,130,246,0.18);
  border-radius:10px;padding:8px 8px 6px;margin-top:2px;display:grid;
  grid-template-columns:64px 1fr 1fr 1fr;gap:4px}
.entry-section-label{grid-column:1/-1;font-size:.6rem;font-weight:700;letter-spacing:.08em;
  text-transform:uppercase;color:var(--muted);margin-bottom:4px;padding-left:2px}
.entry-col-header{text-align:center;font-size:.72rem;font-weight:700;padding:4px 2px}
.entry-row-label{display:flex;flex-direction:column;justify-content:center;font-size:.8rem;
  color:var(--text);padding:4px 2px;font-weight:600;line-height:1.2}
.entry-btn{padding:10px 4px;border-radius:8px;border:2px solid transparent;
  background:rgba(255,255,255,0.04);text-align:center;font-size:.8rem;font-weight:700;
  cursor:pointer;color:var(--muted);display:flex;align-items:center;justify-content:center}
.entry-btn.sel-si{border-color:var(--si);background:rgba(59,130,246,0.18);color:var(--si)}
.entry-btn.sel-ma{border-color:var(--ma);background:rgba(249,115,22,0.18);color:var(--ma)}
.entry-btn.sel-sa{border-color:var(--sa);background:rgba(34,197,94,0.18);color:var(--sa)}
.entry-btn:active{opacity:.7}
.sheet-btns{display:flex;gap:8px;margin-top:6px}
.btn-cancel{flex:1;padding:11px;border-radius:10px;border:1px solid var(--border);
  background:transparent;color:var(--muted);font-size:.88rem;font-weight:600;cursor:pointer}
.btn-save{flex:2;padding:11px;border-radius:10px;border:none;
  background:var(--si);color:#fff;font-size:.88rem;font-weight:700;cursor:pointer}
.btn-save:active{opacity:.85}
.btn-clear{flex:1;padding:11px;border-radius:10px;border:1px solid var(--border);
  background:transparent;color:#ef4444;font-size:.88rem;font-weight:600;cursor:pointer}

/* ── SETTINGS MODAL ── */
.modal{position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:200;
  display:flex;align-items:flex-start;justify-content:center;padding:16px;
  overflow-y:auto;opacity:0;pointer-events:none;transition:opacity .2s}
.modal.show{opacity:1;pointer-events:all}
.modal-box{background:var(--surface);border-radius:16px;width:100%;max-width:400px;
  padding:20px 16px 16px;border:1px solid var(--border);margin:auto}
.modal-title{font-size:1rem;font-weight:700;margin-bottom:16px}
.setting-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.setting-lbl{font-size:.82rem;font-weight:600;width:52px;flex-shrink:0}
.setting-time{flex:1;background:rgba(255,255,255,0.06);border:1px solid var(--border);
  border-radius:8px;color:var(--text);padding:7px 10px;font-size:.82rem;font-family:inherit;outline:none}
.setting-sep{font-size:.8rem;color:var(--muted)}
.setting-pause-row{display:flex;align-items:center;gap:8px;margin-top:2px;margin-bottom:12px}
.setting-pause-lbl{font-size:.72rem;color:var(--muted);width:52px}
.pause-input{width:72px;background:rgba(255,255,255,0.06);border:1px solid var(--border);
  border-radius:8px;color:var(--text);padding:7px 10px;font-size:.82rem;font-family:inherit;outline:none}
.modal-btns{display:flex;gap:8px;margin-top:12px}

/* ── PRINT MODAL ── */
.print-modal{position:fixed;inset:0;z-index:300;background:#f0f0f0;
  overflow-y:auto;padding:16px;display:none}
.print-modal.show{display:block}
.print-actions{display:flex;align-items:center;gap:8px;margin-bottom:10px;background:#1e293b;border-radius:10px;padding:10px 12px}
.print-actions button{padding:8px 16px;border-radius:8px;font-size:.85rem;font-weight:700;cursor:pointer;border:none}
.btn-print-go{background:#2563eb;color:#fff}
.btn-print-close{background:#334155;color:#e2e8f0}
/* the actual printable area */
#printArea{background:#fff;color:#000;margin:0 auto;max-width:960px;padding:10px 8px 14px;font-family:Arial,Helvetica,sans-serif}
.plan-title{text-align:center;font-size:11pt;font-weight:bold;margin-bottom:6px;font-family:Arial}
.plan-table{width:100%;border-collapse:collapse;font-size:7pt;table-layout:fixed}
.plan-table th,.plan-table td{border:1px solid #888;padding:2px 2px;text-align:center;vertical-align:middle;word-break:break-word;color:#000}
.plan-table th{font-weight:bold;background:#e5e7eb}
.plan-table .ph-si{background:#dbeafe;color:#1e40af;text-align:left;padding:3px 5px}
.plan-table .ph-ma{background:#ffedd5;color:#9a3412;text-align:left;padding:3px 5px}
.plan-table .ph-sa{background:#dcfce7;color:#14532d;text-align:left;padding:3px 5px}
.plan-table .sub-th{font-size:6pt;background:#f8fafc}
.plan-table .sun-row td{background:#fef08a;color:#000}
.plan-table .total-row td{font-weight:bold;background:#f3f4f6}
.plan-table .col-nr{width:18pt}
.plan-table .col-wd{width:42pt;text-align:left;padding-left:4px}
.plan-table .col-az{width:52pt}
.plan-table .col-pa{width:18pt}
.plan-table .col-st{width:18pt}
.plan-table .col-son{width:36pt}

@media print{
  body>*{display:none!important}
  .print-modal{display:block!important;position:static!important;background:none!important;padding:0!important;overflow:visible!important}
  .print-actions{display:none!important}
  #printArea{max-width:none;padding:0}
}
@page{size:A4 landscape;margin:8mm}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="topbar-nav">
      <button class="nav-btn" onclick="changeMonth(-1)">◀ Vorheriger</button>
      <div class="month-title" id="monthTitle"></div>
      <button class="nav-btn" onclick="changeMonth(1)">Nächster ▶</button>
      <button class="icon-btn" title="Einstellungen" onclick="openSettings()">⚙️</button>
    </div>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
    <div id="syncErr" style="display:none;font-size:.75rem;color:#ef4444;padding:4px 8px;background:rgba(239,68,68,0.1);border-radius:6px;border:1px solid rgba(239,68,68,0.3)"></div>
  </div>
  <div class="cal-wrap">
    <div class="cal-header">
      <span>Mo</span><span>Di</span><span>Mi</span><span>Do</span><span>Fr</span><span>Sa</span>
    </div>
    <div id="monthSummary" class="month-summary"></div>
    <div class="cal-grid" id="calGrid"></div>
    <button onclick="openPrint()" style="width:100%;margin-top:6px;padding:12px;border-radius:10px;border:none;background:var(--si);color:#fff;font-size:1rem;font-weight:700;cursor:pointer;flex-shrink:0">🖨️ Drucken / Vorschau</button>
  </div>
</div>

<!-- DAY SHEET -->
<div class="overlay" id="dayOverlay" onclick="overlayBgClick(event)">
  <div class="sheet" id="daySheet">
    <div class="sheet-header">
      <button class="day-nav-btn" onclick="navigateDay(-1)">◀</button>
      <div class="sheet-title" id="dayTitle">Tag</div>
      <button class="day-nav-btn" onclick="navigateDay(1)">▶</button>
    </div>
    <div class="entry-grid" id="entryGrid"></div>
    <div class="sheet-btns">
      <button class="btn-cancel" onclick="closeDay()">Abbrechen</button>
      <button class="btn-clear" onclick="clearDay()">Löschen</button>
      <button class="btn-save" onclick="saveDay()">Speichern</button>
    </div>
  </div>
</div>

<!-- SETTINGS MODAL -->
<div class="modal" id="settingsModal" onclick="if(event.target===this)closeSettings()">
  <div class="modal-box">
    <div class="modal-title">⚙️ Einstellungen</div>
    <div style="margin-bottom:14px">
      <div style="font-size:.78rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">Darstellung</div>
      <div style="display:flex;gap:8px">
        <button id="themeAuto" onclick="setTheme('')"  style="flex:1;padding:8px;border-radius:8px;border:1px solid var(--border);background:rgba(255,255,255,0.05);color:var(--text);font-size:.8rem;font-weight:600;cursor:pointer">🌓 Auto</button>
        <button id="themeLight" onclick="setTheme('light')" style="flex:1;padding:8px;border-radius:8px;border:1px solid var(--border);background:rgba(255,255,255,0.05);color:var(--text);font-size:.8rem;font-weight:600;cursor:pointer">☀️ Hell</button>
        <button id="themeDark"  onclick="setTheme('dark')"  style="flex:1;padding:8px;border-radius:8px;border:1px solid var(--border);background:rgba(255,255,255,0.05);color:var(--text);font-size:.8rem;font-weight:600;cursor:pointer">🌙 Dunkel</button>
      </div>
    </div>
    <div style="margin-bottom:14px">
      <div style="font-size:.78rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">Personen (für Druckvorschau)</div>
    <div id="personSettings" style="margin-bottom:14px"></div>
    <div style="font-size:.78rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">Datensicherung</div>
      <div style="font-size:.72rem;color:var(--muted);margin-bottom:8px">Notfall-Backup — nur nötig wenn kein Internet oder Daten verloren gehen.</div>
      <div style="display:flex;gap:8px">
        <button onclick="exportData();closeSettings()" style="flex:1;padding:9px;border-radius:8px;border:1px solid var(--border);background:rgba(255,255,255,0.05);color:var(--text);font-size:.82rem;font-weight:600;cursor:pointer">💾 Als Datei sichern</button>
        <button onclick="document.getElementById('importFile').click()" style="flex:1;padding:9px;border-radius:8px;border:1px solid var(--border);background:rgba(255,255,255,0.05);color:var(--text);font-size:.82rem;font-weight:600;cursor:pointer">📂 Aus Datei laden</button>
      </div>
    </div>
    <div style="font-size:.78rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">Schichtzeiten</div>
    <div id="shiftSettings"></div>
    <div class="modal-btns">
      <button class="btn-cancel" style="flex:1" onclick="closeSettings()">Abbrechen</button>
      <button class="btn-save" style="flex:2" onclick="saveSettings()">Speichern</button>
    </div>
  </div>
</div>

<!-- PRINT MODAL -->
<div class="print-modal" id="printModal">
  <div class="print-actions">
    <button class="btn-print-close" onclick="closePrint()">✕ Schließen</button>
    <div style="display:flex;align-items:center;gap:8px;margin:0 auto">
      <button class="btn-print-close" onclick="printNav(-1)" style="padding:6px 14px;font-size:.9rem">◀</button>
      <span id="printNavTitle" style="font-size:1.1rem;font-weight:800;min-width:160px;text-align:center;color:#f1f5f9;letter-spacing:-.01em"></span>
      <button class="btn-print-close" onclick="printNav(1)" style="padding:6px 14px;font-size:.9rem">▶</button>
    </div>
    <button class="btn-print-go" onclick="printLandscape()">🖨️ Drucken / PDF</button>
  </div>
  <div id="printArea"></div>
</div>

<script>
const PERSONS=['Silke','Martina','Sandra'];
const COLORS_DEFAULT={Silke:'#3b82f6',Martina:'#f97316',Sandra:'#22c55e'};
function pColor(p){return (settings.persons&&settings.persons[p]&&settings.persons[p].color)||COLORS_DEFAULT[p]||'#64748b';}
const INITIALS={Silke:'Si',Martina:'Ma',Sandra:'Sa'};
const SHIFTS=['Urlaub','frei','Früh','Mittel','Spät'];
const SHIFT_SHORT={Urlaub:'U',frei:'-',Früh:'F',Mittel:'M',Spät:'S'};
const WD=['So','Mo','Di','Mi','Do','Fr','Sa'];
const WD_PRINT=['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'];
const WD_LONG=['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'];
const MONTHS=['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
const GREY_SHIFTS=new Set(['Urlaub','frei']);

let curYear,curMonth;
let data={};
let settings={shifts:{
  Früh:{start:'09:45',end:'15:15',pause:0.5},
  Mittel:{start:'09:45',end:'16:00',pause:0.5},
  Spät:{start:'13:00',end:'18:15',pause:0.5},
},persons:{
  Silke:  {name:'Bunzel-Hirche, Silke', vertr:87, delta:'+51,3'},
  Martina:{name:'Weger, Martina',       vertr:87, delta:'+27,75'},
  Sandra: {name:'Jacob, Sandra',        vertr:87, delta:''},
}};
let editDay=null,editSelections={};
let printYear,printMonth;

function showSyncErr(msg){
  const el=document.getElementById('syncErr');
  if(!el)return;
  el.textContent=msg;
  el.style.display='block';
  setTimeout(()=>{el.style.display='none';},6000);
}

function setTheme(t){
  if(t) document.documentElement.setAttribute('data-theme',t);
  else   document.documentElement.removeAttribute('data-theme');
  localStorage.setItem('schicht_theme',t);
  // highlight active button
  ['Auto','Light','Dark'].forEach(n=>{
    const btn=document.getElementById('theme'+n);
    if(!btn)return;
    const active=(t===''&&n==='Auto')||(t==='light'&&n==='Light')||(t==='dark'&&n==='Dark');
    btn.style.borderColor=active?'var(--si)':'var(--border)';
    btn.style.background=active?'rgba(59,130,246,0.18)':'rgba(255,255,255,0.05)';
  });
}
function loadTheme(){
  const t=localStorage.getItem('schicht_theme');
  if(t!==null)setTheme(t);
}

// Hardcoded person defaults — never overwritten by GitHub
const PERSONS_DEFAULT={

// ── Baden-Württemberg Feiertage ───────────────────────────────────────────
function easterSunday(y){
  // Anonymous Gregorian algorithm
  const a=y%19,b=Math.floor(y/100),c=y%100;
  const d=Math.floor(b/4),e=b%4,f=Math.floor((b+8)/25);
  const g=Math.floor((b-f+1)/3),h=(19*a+b-d-g+15)%30;
  const i=Math.floor(c/4),k=c%4,l=(32+2*e+2*i-h-k)%7;
  const m=Math.floor((a+11*h+22*l)/451);
  const month=Math.floor((h+l-7*m+114)/31)-1; // 0-based
  const day=(h+l-7*m+114)%31+1;
  return new Date(y,month,day);
}
function getBWHolidays(y){
  const e=easterSunday(y);
  const add=(d,n)=>{const x=new Date(d);x.setDate(x.getDate()+n);return x;};
  const key=d=>d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();
  const h={};
  // Fixed
  const fixed=[
    [1,1,'Neujahr'],[1,6,'Heilige Drei Könige'],[5,1,'Tag der Arbeit'],
    [10,3,'Tag der Deutschen Einheit'],[11,1,'Allerheiligen'],
    [12,25,'1. Weihnachtstag'],[12,26,'2. Weihnachtstag'],
  ];
  fixed.forEach(([mo,da,name])=>{ h[y+'-'+mo+'-'+da]=name; });
  // Easter-based
  [[+2,'Karfreitag'],[+1,'Ostermontag'],[+39,'Christi Himmelfahrt'],
   [+50,'Pfingstmontag'],[+60,'Fronleichnam']].forEach(([off,name])=>{
    h[key(add(e,off))]=name;
  });
  return h;
}
let _hwCache={};
function isHoliday(y,m,d){
  if(!_hwCache[y]) _hwCache[y]=getBWHolidays(y);
  return _hwCache[y][y+'-'+(m+1)+'-'+d]||'';
}

function navigateDay(delta){
  // save current silently
  _commitDay();
  const dim=new Date(curYear,curMonth+1,0).getDate();
  let next=editDay+delta;
  // skip Sundays
  while(next>=1&&next<=dim&&new Date(curYear,curMonth,next).getDay()===0) next+=delta;
  if(next<1||next>dim)return;
  const prevEntry={...editSelections};
  editDay=next;
  // check if next day is empty → copy from current
  const nextEntry=((data[curYear]||{})[curMonth]||{})[editDay]||{};
  const isEmpty=!PERSONS.some(p=>nextEntry[p]);
  if(isEmpty){
    editSelections={...prevEntry};
  } else {
    editSelections={Silke:nextEntry.Silke||null,Martina:nextEntry.Martina||null,Sandra:nextEntry.Sandra||null};
  }
  const date=new Date(curYear,curMonth,editDay);
  document.getElementById('dayTitle').innerHTML=
    `${editDay}. ${MONTHS[curMonth]}&nbsp;<span>${WD_LONG[date.getDay()]}</span>`;
  renderEntryGrid();
}

function _commitDay(){
  if(!data[curYear])data[curYear]={};

// ── Hours ─────────────────────────────────────────────────────────────────
function calcHours(shift){
  const s=settings.shifts[shift];if(!s)return 0;
  const[sh,sm]=s.start.split(':').map(Number);
  const[eh,em]=s.end.split(':').map(Number);
  return Math.round(((eh*60+em-sh*60-sm)/60-s.pause)*100)/100;
}
function shiftTimeStr(shift){const s=settings.shifts[shift];return s?s.start+' - '+s.end:'';}

async function gistLoad(){
  try{
    const r = await fetch(GH_API, {headers:{Authorization:'token '+GH_TOK, Accept:'application/vnd.github.v3+json'}});
    if(!r.ok) throw new Error('HTTP '+r.status);
    const meta = await r.json();
    const raw = atob(meta.content.replace(/[^A-Za-z0-9+/=]/g,''));
    const payload = JSON.parse(decodeURIComponent(escape(raw)));
    if(!payload.data) throw new Error('no data');
    const ghTime  = payload.saved ? new Date(payload.saved).getTime() : 0;
    const locTime = localStorage.getItem('schicht_saved') ? new Date(localStorage.getItem('schicht_saved')).getTime() : 0;
    if(ghTime > locTime){
      data = payload.data;
      if(payload.settings){
        settings = payload.settings;
      }
      // Always enforce person defaults — never trust GitHub for names
      if(!settings.persons) settings.persons={};
      PERSONS.forEach(p=>{
        if(!settings.persons[p]||settings.persons[p].name===p)
          settings.persons[p]=PERSONS_DEFAULT[p];
      });
      localStorage.setItem('schicht_data', JSON.stringify(data));
      localStorage.setItem('schicht_settings', JSON.stringify(settings));
      localStorage.setItem('schicht_saved', payload.saved);
    } else if(locTime > ghTime){
      gistSave();
    }
  }catch(e){ showSyncErr('⚠ Laden fehlgeschlagen: '+e.message); }
}

async function gistSave(){
  if(!GH_TOK) return;
  try{
    // Always get fresh SHA before writing
    const rGet = await fetch(GH_API,{headers:{Authorization:'token '+GH_TOK,Accept:'application/vnd.github.v3+json'}});
    if(!rGet.ok) throw new Error('Lesen fehlgeschlagen: HTTP '+rGet.status);
    const meta = await rGet.json();
    const currentSha = meta.sha;
    const payload = {data, settings, saved: new Date().toISOString()};
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(payload,null,2))));
    const rPut = await fetch(GH_API,{method:'PUT',
      headers:{Authorization:'token '+GH_TOK,Accept:'application/vnd.github.v3+json','Content-Type':'application/json'},
      body:JSON.stringify({message:'Update shift data',content,sha:currentSha})});
    if(rPut.ok){
      localStorage.setItem('schicht_saved',payload.saved);
    } else {
      const err=await rPut.json().catch(()=>({}));
      throw new Error(err.message||'HTTP '+rPut.status);
    }
  }catch(e){ showSyncErr('⚠ Speichern fehlgeschlagen: '+e.message); }
}


// ── Export / Import ───────────────────────────────────────────────────────
function exportData(){
  const payload={data,settings,exported:new Date().toISOString()};
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const d=new Date();
  a.href=url;
  a.download='schichtplan_'+d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'.json';
  a.click();URL.revokeObjectURL(url);
}
function importData(evt){
  const f=evt.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=function(e){
    try{
      const p=JSON.parse(e.target.result);
      if(p.data)data=p.data;
      if(p.settings)settings=p.settings;
      saveStorage();renderCalendar();
      alert('✅ Importiert: '+Object.keys(data).length+' Jahr(e) geladen.');
    }catch(ex){alert('❌ Fehler: '+ex.message);}
  };
  r.readAsText(f);evt.target.value='';
}

// ── Swipe gestures ────────────────────────────────────────────────────────
function addSwipe(el, onLeft, onRight){
  let x0=null;
  el.addEventListener('touchstart',e=>{x0=e.touches[0].clientX;},{passive:true});
  el.addEventListener('touchend',e=>{
    if(x0===null)return;
    const dx=e.changedTouches[0].clientX-x0;
    if(Math.abs(dx)>50){dx<0?onLeft():onRight();}
    x0=null;
  },{passive:true});
}
// Calendar: swipe left = next month, right = previous month
addSwipe(document.getElementById('calGrid'),()=>changeMonth(1),()=>changeMonth(-1));
// Day sheet: swipe left = next day, right = previous day
addSwipe(document.getElementById('daySheet'),()=>navigateDay(1),()=>navigateDay(-1));

// ── Init ──────────────────────────────────────────────────────────────────
loadStorage();
loadTheme();
const now=new Date();
curYear=now.getFullYear();curMonth=now.getMonth();
gistLoad().then(()=>renderCalendar()).catch(()=>renderCalendar());
</script>
