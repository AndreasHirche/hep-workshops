// ── Globe ─────────────────────────────────────────────────────────────────────
const globeEl = document.createElement('div');
globeEl.style.cssText = 'position:fixed;inset:0';
document.body.prepend(globeEl);

const globe = Globe({ animateIn: false })
  .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-night.jpg')
  .bumpImageUrl('https://unpkg.com/three-globe/example/img/earth-topology.png')
  .backgroundImageUrl('https://unpkg.com/three-globe/example/img/night-sky.png')
  .backgroundColor('#0f172a')
  .showAtmosphere(true).atmosphereColor('#2563eb').atmosphereAltitude(0.14)
  .showGraticules(true)
  .pointsData(MARKERS)
  .pointLat('lat').pointLng('lng')
  .pointColor(d => d.upcoming > 0 ? (d.color || '#3b82f6') : '#64748b')
  .pointRadius(d => Math.max(0.35, Math.min(1.6, 0.2 + d.count * 0.2)))
  .pointAltitude(0.025)
  .pointLabel(d => `<div style="background:#1e293b;color:#e2e8f0;padding:5px 10px;border-radius:8px;font-size:0.75rem;font-family:system-ui;border:1px solid #334155">${d.loc}<br>${d.count} workshop${d.count>1?'s':''}${d.upcoming?' · <span style="color:#86efac">'+d.upcoming+' upcoming</span>':''}</div>`)
  (globeEl);

globe.controls().autoRotate = true;
globe.controls().autoRotateSpeed = 0.35;
globe.controls().enableDamping = true;
globe.controls().dampingFactor = 0.1;
globe.pointOfView({ lat: 30, lng: 15, altitude: 2.2 }, 0);

// ── Wait for globe renderer ───────────────────────────────────────────────────
function waitForGlobe(fn) {
  if (globe.renderer && globe.renderer()) fn();
  else requestAnimationFrame(() => waitForGlobe(fn));
}

waitForGlobe(() => {
  const renderer = globe.renderer();
  const scene    = globe.scene();
  const camera   = globe.camera();

  renderer.xr.enabled = true;
  camera.far = 50000; camera.updateProjectionMatrix();

  // VRButton
  const btn = VRButton.createButton(renderer);
  btn.style.cssText = 'padding:12px 28px;border-radius:8px;border:2px solid #60a5fa;background:rgba(15,23,42,0.92);color:#e2e8f0;font-size:1rem;font-family:system-ui;cursor:pointer;backdrop-filter:blur(8px);font-weight:600';
  document.getElementById('vr-btn-wrap').appendChild(btn);

  // ── Camera rig ────────────────────────────────────────────────────────────
  const rig = new T.Group();
  rig.position.set(0, 20, 280);
  scene.add(rig);
  rig.add(camera);

  // ── Lights ────────────────────────────────────────────────────────────────
  scene.add(new T.AmbientLight(0xffffff, 1.5));
  const sun = new T.DirectionalLight(0xfff8e0, 2);
  sun.position.set(400, 200, 300); scene.add(sun);

  // ── Rocket ────────────────────────────────────────────────────────────────
  const M = T.MeshBasicMaterial;
  const rocket = new T.Group();
  rocket.add(new T.Mesh(new T.CapsuleGeometry(2.5, 9, 8, 16), new M({ color: 0xbcc8d4 })));
  const nose = new T.Mesh(new T.ConeGeometry(2.5, 5, 16), new M({ color: 0x1d4ed8 }));
  nose.position.y = 9.5; rocket.add(nose);
  for (let i = 0; i < 3; i++) {
    const pv = new T.Group(); pv.rotation.y = (i/3)*Math.PI*2;
    const fin = new T.Mesh(new T.BoxGeometry(1, 5, 3.5), new M({ color: 0x3b82f6 }));
    fin.position.set(3.5, -7, 0); pv.add(fin); rocket.add(pv);
  }
  const flameMat = new M({ color: 0xf97316, transparent: true, opacity: 0.9 });
  const flame = new T.Mesh(new T.ConeGeometry(1.8, 5, 10), flameMat);
  flame.position.y = -9.5; flame.rotation.z = Math.PI; rocket.add(flame);
  const winRing = new T.Mesh(new T.TorusGeometry(0.8, 0.2, 8, 16), new M({ color: 0x94a3b8 }));
  winRing.position.set(2.5, 1.5, 0); winRing.rotation.y = Math.PI/2; rocket.add(winRing);
  const winGlass = new T.Mesh(new T.CircleGeometry(0.62, 16), new M({ color: 0x0a2d5e, side: T.DoubleSide }));
  winGlass.position.set(2.52, 1.5, 0); winGlass.rotation.y = Math.PI/2; rocket.add(winGlass);
  rocket.rotation.x = -Math.PI/2;
  const rocketOrbit = new T.Group();
  rocketOrbit.rotation.x = 0.4; rocketOrbit.rotation.z = 0.3;
  rocket.position.set(140, 0, 0); rocketOrbit.add(rocket);
  scene.add(rocketOrbit);

  // ── Canvas panel builder ──────────────────────────────────────────────────
  function makePanel(lines, opts = {}) {
    const W = opts.w || 512;
    const lineH = opts.lineH || 40;
    const padTop = 16, padBot = 16;
    const H = opts.h || (lines.length * lineH + padTop + padBot);
    const cv = document.createElement('canvas'); cv.width = W; cv.height = H;
    const ctx = cv.getContext('2d');
    ctx.fillStyle = opts.bg || 'rgba(8,16,36,0.95)';
    if (ctx.roundRect) { ctx.roundRect(0,0,W,H,14); ctx.fill(); }
    else { ctx.fillRect(0,0,W,H); }
    ctx.strokeStyle = opts.border || '#60a5fa'; ctx.lineWidth = 2.5;
    if (ctx.roundRect) { ctx.roundRect(1,1,W-2,H-2,13); ctx.stroke(); }
    else { ctx.strokeRect(1,1,W-2,H-2); }
    lines.forEach((line, i) => {
      ctx.fillStyle = line.color || '#e2e8f0';
      const sz = line.size || 22;
      ctx.font = `${line.bold ? 'bold ' : ''}${sz}px system-ui,sans-serif`;
      ctx.textAlign = line.align || 'center';
      const x = line.align === 'left' ? 20 : W / 2;
      ctx.fillText(line.text, x, padTop + sz + i * lineH, W - 30);
    });
    const tex = new T.CanvasTexture(cv);
    const mat = new M({ map: tex, transparent: true, side: T.DoubleSide });
    const scale = opts.scale || 0.09;
    return new T.Mesh(new T.PlaneGeometry(W * scale, H * scale), mat);
  }

  // ── Title panel ───────────────────────────────────────────────────────────
  const upcoming = MARKERS.reduce((s,d)=>s+d.upcoming,0);
  const total    = MARKERS.reduce((s,d)=>s+d.count,0);
  const titlePanel = makePanel([
    { text: 'HEP Workshops — Global View', color: '#60a5fa', bold: true, size: 26 },
    { text: `${total} workshops · ${upcoming} upcoming · ${MARKERS.length} locations`, color: '#4ade80', size: 20 },
  ], { w: 600, scale: 0.09, lineH: 42 });
  titlePanel.position.set(0, 130, 0);
  scene.add(titlePanel);

  // ── Controls hint ─────────────────────────────────────────────────────────
  const hintPanel = makePanel([
    { text: 'VR Controls', color: '#fde047', bold: true, size: 24 },
    { text: 'Left stick  →  move / strafe', color: '#e2e8f0', size: 19 },
    { text: 'Right stick →  turn · up/down', color: '#e2e8f0', size: 19 },
    { text: 'Right trigger → spin globe', color: '#e2e8f0', size: 19 },
    { text: 'Aim at marker + trigger → info', color: '#86efac', size: 19 },
    { text: 'Oculus button → exit VR', color: '#94a3b8', size: 17 },
  ], { w: 560, lineH: 38, border: '#fde047' });
  scene.add(hintPanel);

  // ── Exit panel (attached to rig) ──────────────────────────────────────────
  const exitPanel = makePanel([
    { text: '✕  EXIT VR', color: '#f87171', bold: true, size: 28 },
    { text: 'Aim + trigger', color: '#94a3b8', size: 18 },
  ], { w: 280, h: 110, border: '#f87171', scale: 0.1 });
  exitPanel.position.set(28, -6, -48);
  rig.add(exitPanel);

  // ── Info panel (world-space, shown when marker selected) ──────────────────
  let infoPanelMesh = null;
  let infoPanelVisible = false;

  function buildInfoPanel(loc) {
    if (infoPanelMesh) { scene.remove(infoPanelMesh); infoPanelMesh = null; }
    const ws = WORKSHOPS[loc] || [];
    if (!ws.length) return null;

    const lines = [
      { text: loc, color: '#60a5fa', bold: true, size: 26 },
      { text: `${ws.length} workshop${ws.length>1?'s':''}`, color: '#94a3b8', size: 18 },
    ];
    ws.forEach(w => {
      const statusColor = w.status === 'past' ? '#64748b' : w.status === 'upcoming' ? '#4ade80' : '#fbbf24';
      const agendaMark = w.agenda ? ' 📋' : '';
      lines.push({ text: `${w.date || 'TBD'}`, color: '#94a3b8', size: 16, align: 'left' });
      lines.push({ text: `  ${w.topic}${agendaMark}`, color: w.color || '#e2e8f0', size: 18, bold: true, align: 'left' });
    });
    lines.push({ text: ws.some(w=>w.agenda) ? '[ trigger again to open agenda ]' : '', color: '#475569', size: 15 });

    const panel = makePanel(lines, { w: 580, lineH: 32, h: lines.length * 32 + 40, border: '#60a5fa', scale: 0.1 });
    scene.add(panel);
    infoPanelMesh = panel;
    return panel;
  }

  // Convert lat/lng to 3D globe position
  // ── Marker hit-spheres — parented to globe's own scene group so they
  //    rotate with the globe automatically ──────────────────────────────────
  // Find globe's root group (first Group child of scene that isn't rig)
  let globeRoot = null;
  for (const child of scene.children) {
    if (child.type === 'Group' && child !== rig) { globeRoot = child; break; }
  }

  // globe.gl uses a Globe radius of 100 units. We place spheres at r=105.
  function latLngToLocal(lat, lng, r = 105) {
    const phi   = (90 - lat) * Math.PI / 180;
    const theta = (lng + 180) * Math.PI / 180;
    return new T.Vector3(
      -r * Math.sin(phi) * Math.cos(theta),
       r * Math.cos(phi),
       r * Math.sin(phi) * Math.sin(theta)
    );
  }

  const markerSpheres = MARKERS.map(m => {
    const pos = latLngToLocal(m.lat, m.lng, 108);
    const geo = new T.SphereGeometry(5, 8, 8);
    const mat = new M({ color: parseInt(m.color.replace('#',''), 16), transparent: true, opacity: 0.15 });
    const mesh = new T.Mesh(geo, mat);
    mesh.position.copy(pos);
    mesh.userData = m;
    // Add to globe's root group so they rotate with the globe
    if (globeRoot) globeRoot.add(mesh);
    else scene.add(mesh);
    return mesh;
  });
  });

  // ── XR controllers ────────────────────────────────────────────────────────
  const raycaster = new T.Raycaster();
  raycaster.far = 600;
  const worldPos  = new T.Vector3();
  const worldQuat = new T.Quaternion();
  const rayDir    = new T.Vector3();

  const ctrl = [
    renderer.xr.getController(0),
    renderer.xr.getController(1),
  ];

  let selectedLoc = null;
  let agendaTriggered = false;

  ctrl.forEach((c, i) => {
    rig.add(c);
    // Pointer ray line
    const rayGeo = new T.BufferGeometry().setFromPoints([new T.Vector3(0,0,0), new T.Vector3(0,0,-1)]);
    const rayLine = new T.Line(rayGeo, new T.LineBasicMaterial({ color: i===0 ? 0x60a5fa : 0xf87171 }));
    rayLine.scale.z = 80;
    c.add(rayLine);

    c.addEventListener('selectstart', () => {
      c.getWorldPosition(worldPos);
      c.getWorldQuaternion(worldQuat);
      rayDir.set(0, 0, -1).applyQuaternion(worldQuat);
      raycaster.set(worldPos, rayDir);

      // 1. Check exit panel
      const exitHit = raycaster.intersectObject(exitPanel, true);
      if (exitHit.length > 0) { renderer.xr.getSession()?.end(); return; }

      // 2. Check marker spheres
      const markerHits = raycaster.intersectObjects(markerSpheres, false);
      if (markerHits.length > 0) {
        const hit = markerHits[0];
        const m   = hit.object.userData;

        if (selectedLoc === m.loc) {
          // Second trigger on same location → try open agenda
          const ws = WORKSHOPS[m.loc] || [];
          const withAgenda = ws.find(w => w.agenda);
          if (withAgenda) {
            // Open agenda URL (works in 2D browser; in VR opens in overlay/browser)
            window.open(withAgenda.agenda, '_blank');
          }
          return;
        }

        selectedLoc = m.loc;

        // Position info panel: get world position of the hit marker sphere
        const panel = buildInfoPanel(m.loc);
        if (panel) {
          // Get world position of the hit sphere (it moves with globe)
          const markerWorld = new T.Vector3();
          hit.object.getWorldPosition(markerWorld);
          // Push panel slightly further out from globe centre
          const dir = markerWorld.clone().normalize();
          panel.position.copy(markerWorld.clone().addScaledVector(dir, 30));
          // Face outward from globe centre (away from origin)
          panel.lookAt(new T.Vector3(0, 0, 0));
          panel.rotateY(Math.PI);
          infoPanelVisible = true;
        }
        globe.controls().autoRotate = false;
        return;
      }

      // 3. Click empty space → close info panel
      if (infoPanelVisible) {
        if (infoPanelMesh) { scene.remove(infoPanelMesh); infoPanelMesh = null; }
        infoPanelVisible = false;
        selectedLoc = null;
        globe.controls().autoRotate = true;
      }
    });
  });

  // ── XR session events ─────────────────────────────────────────────────────
  let inVR = false, hintTimer = 0;
  renderer.xr.addEventListener('sessionstart', () => {
    inVR = true; hintTimer = 0;
    hintPanel.visible = true;
    // Place hint panel in world space, facing player
    hintPanel.position.set(0, 60, 150);
    selectedLoc = null;
  });
  renderer.xr.addEventListener('sessionend', () => {
    inVR = false;
    globe.controls().autoRotate = true;
  });

  // ── Render loop ───────────────────────────────────────────────────────────
  const _tmp = new T.Vector3();
  const _fwd = new T.Vector3();
  const _rgt = new T.Vector3();
  let tick = 0;

  // Highlight marker under controller ray (hover glow)
  let hoveredMarker = null;

  renderer.setAnimationLoop((time, frame) => {
    tick += 0.016;
    rocketOrbit.rotation.y += 0.006;
    flameMat.opacity = 0.7 + 0.2 * Math.sin(tick * 7.5);
    globe.controls().update();

    if (inVR) {
      hintTimer += 0.016;
      if (hintTimer > 9 && hintPanel.visible) hintPanel.visible = false;

      _tmp.setFromMatrixPosition(camera.matrixWorld);
      titlePanel.lookAt(_tmp);
      hintPanel.lookAt(_tmp);

      // ── Hover: highlight marker under right controller ray ────────────────
      ctrl[1].getWorldPosition(worldPos);
      ctrl[1].getWorldQuaternion(worldQuat);
      rayDir.set(0, 0, -1).applyQuaternion(worldQuat);
      raycaster.set(worldPos, rayDir);
      const hoverHits = raycaster.intersectObjects(markerSpheres, false);
      const newHovered = hoverHits.length > 0 ? hoverHits[0].object : null;
      if (newHovered !== hoveredMarker) {
        if (hoveredMarker) hoveredMarker.material.opacity = 0.15;
        if (newHovered) newHovered.material.opacity = 0.7;
        hoveredMarker = newHovered;
      }

      // ── Gamepad input ─────────────────────────────────────────────────────
      const session = renderer.xr.getSession();
      const sources = session ? [...session.inputSources] : [];
      let leftAxes = null, rightAxes = null, rightTrigger = 0;
      sources.forEach(src => {
        if (!src.gamepad) return;
        if (src.handedness === 'left'  && src.gamepad.axes.length >= 4) leftAxes = src.gamepad.axes;
        if (src.handedness === 'right' && src.gamepad.axes.length >= 4) {
          rightAxes    = src.gamepad.axes;
          rightTrigger = src.gamepad.buttons[0]?.value ?? 0;
        }
      });

      if (leftAxes) {
        const lx = Math.abs(leftAxes[2]) > DEADZONE ? leftAxes[2] : 0;
        const ly = Math.abs(leftAxes[3]) > DEADZONE ? leftAxes[3] : 0;
        if (lx || ly) {
          camera.getWorldDirection(_fwd); _fwd.y = 0; _fwd.normalize();
          _rgt.crossVectors(new T.Vector3(0,1,0), _fwd).negate();
          rig.position.addScaledVector(_fwd, -ly * MOVE_SPEED);
          rig.position.addScaledVector(_rgt,  lx * MOVE_SPEED);
        }
      }
      if (rightAxes) {
        const rx = Math.abs(rightAxes[2]) > DEADZONE ? rightAxes[2] : 0;
        const ry = Math.abs(rightAxes[3]) > DEADZONE ? rightAxes[3] : 0;
        if (rx) rig.rotateY(-rx * TURN_SPEED);
        if (ry) rig.position.y -= ry * MOVE_SPEED * 0.5;
      }
      // Right trigger + left stick → spin globe
      if (rightTrigger > 0.5 && leftAxes) {
        const lx = Math.abs(leftAxes[2]) > DEADZONE ? leftAxes[2] : 0;
        if (lx) { globe.controls().autoRotate = false; /* globe spins via controls drag */ }
      }
    }

    renderer.render(scene, camera);
  });
});
</script>
</body>
</html>
