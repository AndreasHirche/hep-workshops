<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>HEP Workshops — VR Globe</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f172a;overflow:hidden;font-family:system-ui,sans-serif}
canvas{display:block}
#vr-btn-wrap{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:10}
#info{position:fixed;top:16px;left:50%;transform:translateX(-50%);
  background:rgba(15,23,42,0.85);border:1px solid #334155;border-radius:10px;
  padding:8px 18px;color:#e2e8f0;font-size:0.8rem;text-align:center;z-index:10;
  backdrop-filter:blur(8px)}
#info a{color:#60a5fa;text-decoration:none}
#info a:hover{text-decoration:underline}
</style>
</head>
<body>
<div id="info">
  HEP Workshops Globe — VR Mode &nbsp;|&nbsp;
  <a href="index.html">← Back to Dashboard</a>
</div>
<div id="vr-btn-wrap"></div>

<script type="importmap">{"imports":{"three":"https://esm.sh/three@0.179.0","three/addons/":"https://esm.sh/three@0.179.0/examples/jsm/"}}</script>
<script type="module">
import * as THREE from 'three';
import { VRButton } from 'three/addons/webxr/VRButton.js';
import Globe from 'https://esm.sh/globe.gl@2.45.3';

// ── Markers ──────────────────────────────────────────────────────────────────
const MARKERS = [{"loc":"Monterrey","lat":25.687,"lng":-100.316,"count":1,"upcoming":0,"past":1,"postponed":0,"color":"#c4b5fd"},{"loc":"Walldorf","lat":49.306,"lng":8.638,"count":3,"upcoming":0,"past":1,"postponed":2,"color":"#4ade80"},{"loc":"Barcelona","lat":41.385,"lng":2.173,"count":3,"upcoming":0,"past":1,"postponed":2,"color":"#7dd3fc"},{"loc":"Bengaluru","lat":12.972,"lng":77.595,"count":3,"upcoming":0,"past":2,"postponed":1,"color":"#7dd3fc"},{"loc":"Madrid","lat":40.417,"lng":-3.704,"count":5,"upcoming":2,"past":1,"postponed":2,"color":"#2dd4bf"},{"loc":"Mexico City","lat":19.433,"lng":-99.133,"count":3,"upcoming":2,"past":1,"postponed":0,"color":"#fde047"},{"loc":"Zürich","lat":47.377,"lng":8.542,"count":11,"upcoming":6,"past":2,"postponed":3,"color":"#7dd3fc"},{"loc":"Rot","lat":49.286,"lng":8.616,"count":9,"upcoming":8,"past":0,"postponed":1,"color":"#fde047"},{"loc":"Madrid","lat":40.417,"lng":-3.704,"count":5,"upcoming":2,"past":1,"postponed":2,"color":"#2dd4bf"},{"loc":"Milan","lat":45.465,"lng":9.186,"count":4,"upcoming":4,"past":0,"postponed":0,"color":"#7dd3fc"},{"loc":"Helsinki","lat":60.17,"lng":24.938,"count":3,"upcoming":1,"past":0,"postponed":2,"color":"#c4b5fd"},{"loc":"Paris","lat":48.857,"lng":2.352,"count":3,"upcoming":1,"past":0,"postponed":2,"color":"#c4b5fd"},{"loc":"São Paulo","lat":-23.551,"lng":-46.633,"count":2,"upcoming":1,"past":0,"postponed":1,"color":"#7dd3fc"},{"loc":"Stockholm","lat":59.333,"lng":18.065,"count":1,"upcoming":1,"past":0,"postponed":0,"color":"#fde047"},{"loc":"Vancouver","lat":49.283,"lng":-123.121,"count":1,"upcoming":1,"past":0,"postponed":0,"color":"#4ade80"},{"loc":"Bellevue","lat":47.611,"lng":-122.192,"count":1,"upcoming":1,"past":0,"postponed":0,"color":"#2dd4bf"},{"loc":"Buenos Aires","lat":-34.604,"lng":-58.382,"count":2,"upcoming":2,"past":0,"postponed":0,"color":"#fde047"},{"loc":"Bogotá","lat":4.711,"lng":-74.073,"count":3,"upcoming":3,"past":0,"postponed":0,"color":"#fde047"},{"loc":"London","lat":51.507,"lng":-0.128,"count":2,"upcoming":0,"past":0,"postponed":2,"color":"#fde047"},{"loc":"Vienna","lat":48.208,"lng":16.374,"count":1,"upcoming":0,"past":0,"postponed":1,"color":"#c4b5fd"},{"loc":"Brussels","lat":50.846,"lng":4.352,"count":2,"upcoming":2,"past":0,"postponed":0,"color":"#7dd3fc"},{"loc":"Palo Alto","lat":37.442,"lng":-122.143,"count":1,"upcoming":0,"past":1,"postponed":0,"color":"#c4b5fd"},{"loc":"KSA","lat":23.886,"lng":45.079,"count":4,"upcoming":4,"past":0,"postponed":0,"color":"#c4b5fd"},{"loc":"Abu Dhabi","lat":24.453,"lng":54.377,"count":1,"upcoming":1,"past":0,"postponed":0,"color":"#fde047"},{"loc":"Israel","lat":31.769,"lng":35.217,"count":2,"upcoming":2,"past":0,"postponed":0,"color":"#fde047"},{"loc":"Denmark","lat":56.263,"lng":9.502,"count":1,"upcoming":1,"past":0,"postponed":0,"color":"#7dd3fc"},{"loc":"Slovakia","lat":48.669,"lng":19.699,"count":2,"upcoming":2,"past":0,"postponed":0,"color":"#c4b5fd"},{"loc":"Budapest","lat":47.498,"lng":19.04,"count":1,"upcoming":0,"past":1,"postponed":0,"color":"#fde047"}];

// ── Globe setup ───────────────────────────────────────────────────────────────
const globeEl = document.createElement('div');
globeEl.style.cssText = 'position:fixed;inset:0';
document.body.prepend(globeEl);

const globe = Globe({ animateIn: false })
  .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-night.jpg')
  .bumpImageUrl('https://unpkg.com/three-globe/example/img/earth-topology.png')
  .backgroundImageUrl('https://unpkg.com/three-globe/example/img/night-sky.png')
  .backgroundColor('#0f172a')
  .showAtmosphere(true).atmosphereColor('#2563eb').atmosphereAltitude(0.14)
  .showGraticules(true)
  .pointsData(MARKERS)
  .pointLat('lat').pointLng('lng')
  .pointColor(d => d.upcoming > 0 ? (d.color || '#3b82f6') : '#64748b')
  .pointRadius(d => Math.max(0.28, Math.min(1.4, 0.18 + d.count * 0.18)))
  .pointAltitude(0.015)
  .pointLabel(d => `<div style="background:#1e293b;color:#e2e8f0;padding:5px 10px;border-radius:8px;font-size:0.75rem;font-family:system-ui;border:1px solid #334155">${d.loc} — ${d.count} workshop${d.count>1?'s':''}</div>`)
  (globeEl);

globe.controls().autoRotate = true;
globe.controls().autoRotateSpeed = 0.35;
globe.controls().enableDamping = true;
globe.controls().dampingFactor = 0.1;
globe.pointOfView({ lat: 30, lng: 15, altitude: 2.2 }, 0);

// ── WebXR / VR setup ──────────────────────────────────────────────────────────
// Wait for globe renderer to be ready
function waitForGlobe(fn) {
  if (globe.renderer && globe.renderer()) fn();
  else requestAnimationFrame(() => waitForGlobe(fn));
}

waitForGlobe(() => {
  const renderer = globe.renderer();
  const scene    = globe.scene();
  const camera   = globe.camera();

  // Enable WebXR
  renderer.xr.enabled = true;

  // VRButton
  const btn = VRButton.createButton(renderer);
  btn.style.cssText = 'padding:12px 24px;border-radius:8px;border:2px solid #60a5fa;background:rgba(15,23,42,0.9);color:#e2e8f0;font-size:0.9rem;font-family:system-ui;cursor:pointer;backdrop-filter:blur(8px)';
  document.getElementById('vr-btn-wrap').appendChild(btn);

  // Camera rig — puts user at a comfortable viewing distance from the globe
  const rig = new THREE.Group();
  // Globe radius = ~100 units in globe.gl; position rig ~300 units back
  rig.position.set(0, 20, 280);
  scene.add(rig);
  rig.add(camera);

  // ── Rocket in orbit ────────────────────────────────────────────────────────
  const T = THREE;
  const M = T.MeshBasicMaterial;
  camera.far = 50000; camera.updateProjectionMatrix();
  scene.add(new T.AmbientLight(0xffffff, 1.5));
  const sun = new T.DirectionalLight(0xfff8e0, 2);
  sun.position.set(400, 200, 300); scene.add(sun);

  const rocket = new T.Group();
  const silver = new M({ color: 0xbcc8d4 });
  rocket.add(new T.Mesh(new T.CapsuleGeometry(2.5, 9, 8, 16), silver));
  const nose = new T.Mesh(new T.ConeGeometry(2.5, 5, 16), new M({ color: 0x1d4ed8 }));
  nose.position.y = 9.5; rocket.add(nose);
  for (let i = 0; i < 3; i++) {
    const pv = new T.Group(); pv.rotation.y = (i/3)*Math.PI*2;
    const fin = new T.Mesh(new T.BoxGeometry(1, 5, 3.5), new M({ color: 0x3b82f6 }));
    fin.position.set(3.5, -7, 0); pv.add(fin); rocket.add(pv);
  }
  const flameMat = new M({ color: 0xf97316, transparent: true, opacity: 0.9 });
  const flame = new T.Mesh(new T.ConeGeometry(1.8, 5, 10), flameMat);
  flame.position.y = -9.5; flame.rotation.z = Math.PI; rocket.add(flame);
  const winRing = new T.Mesh(new T.TorusGeometry(0.8, 0.2, 8, 16), new M({ color: 0x94a3b8 }));
  winRing.position.set(2.5, 1.5, 0); winRing.rotation.y = Math.PI/2; rocket.add(winRing);
  const winGlass = new T.Mesh(new T.CircleGeometry(0.62, 16), new M({ color: 0x0a2d5e, side: T.DoubleSide }));
  winGlass.position.set(2.52, 1.5, 0); winGlass.rotation.y = Math.PI/2; rocket.add(winGlass);
  rocket.rotation.x = -Math.PI/2;

  const orbit = new T.Group();
  orbit.rotation.x = 0.4; orbit.rotation.z = 0.3;
  rocket.position.set(140, 0, 0); orbit.add(rocket);
  scene.add(orbit);

  // ── VR label plane (floating text in VR space) ────────────────────────────
  function makeLabel(text, color='#e2e8f0') {
    const cv = document.createElement('canvas'); cv.width=512; cv.height=64;
    const ctx = cv.getContext('2d');
    ctx.fillStyle='rgba(15,23,42,0.85)'; ctx.roundRect(0,0,512,64,12); ctx.fill();
    ctx.strokeStyle=color; ctx.lineWidth=2; ctx.roundRect(1,1,510,62,11); ctx.stroke();
    ctx.fillStyle=color; ctx.font='bold 26px system-ui,sans-serif'; ctx.textAlign='center';
    ctx.fillText(text, 256, 42);
    const tex = new T.CanvasTexture(cv);
    const mat = new M({ map: tex, transparent: true, side: T.DoubleSide });
    const mesh = new T.Mesh(new T.PlaneGeometry(40, 5), mat);
    return mesh;
  }

  const titleLabel = makeLabel('HEP Workshops — Global View', '#60a5fa');
  titleLabel.position.set(0, 120, -60);
  scene.add(titleLabel);

  // Stats label
  const upcoming = MARKERS.reduce((s,d)=>s+d.upcoming,0);
  const total    = MARKERS.reduce((s,d)=>s+d.count,0);
  const statsLabel = makeLabel(`${total} workshops · ${upcoming} upcoming · ${MARKERS.length} locations`, '#4ade80');
  statsLabel.position.set(0, 108, -60);
  scene.add(statsLabel);

  // ── Replace globe.gl's render loop with setAnimationLoop for WebXR ─────────
  // globe.gl uses its own RAF loop; for WebXR we need setAnimationLoop
  let tick = 0;
  renderer.setAnimationLoop(() => {
    orbit.rotation.y += 0.006;
    flameMat.opacity = 0.7 + 0.2 * Math.sin(tick += 0.12);
    globe.controls().update();
    // Keep labels facing camera
    titleLabel.lookAt(camera.position);
    statsLabel.lookAt(camera.position);
    renderer.render(scene, camera);
  });

  console.log('WebXR Globe ready. renderer.xr.enabled:', renderer.xr.enabled);
});
</script>
</body>
</html>
