<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Missions Dashboard</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%232563eb'/><text x='16' y='23' font-family='system-ui,sans-serif' font-size='18' font-weight='900' fill='white' text-anchor='middle'>M</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#06070f;--glass:rgba(255,255,255,0.05);--border:rgba(255,255,255,0.1);--purple:#7c3aed;--cyan:#06b6d4;--text:#e2e8f0;--muted:#94a3b8}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;
  background-image:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(124,58,237,0.25) 0%,transparent 70%),
    radial-gradient(ellipse 40% 40% at 80% 80%,rgba(6,182,212,0.1) 0%,transparent 60%)}
.grid-bg{position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:linear-gradient(rgba(255,255,255,0.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,0.03) 1px,transparent 1px);background-size:48px 48px}
.particles{position:fixed;inset:0;pointer-events:none;z-index:0}
.particle{position:absolute;border-radius:50%;animation:float linear infinite}
@keyframes float{0%{transform:translateY(100vh) translateX(0);opacity:0}10%{opacity:1}90%{opacity:1}100%{transform:translateY(-20px) translateX(40px);opacity:0}}
.wrap{position:relative;z-index:1;max-width:100%;margin:0 auto}

/* Header — title left, search right */
header{display:flex;align-items:center;gap:20px;margin-bottom:20px}
.header-left{flex-shrink:0}
header h1{font-size:2rem;font-weight:700;background:linear-gradient(135deg,#e2e8f0,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
header p{color:var(--muted);font-size:0.85rem;margin-top:4px}
.header-right{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
.header-search{background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:8px 14px;font-family:'Inter',sans-serif;font-size:0.82rem;outline:none;transition:border-color .2s;flex:1;min-width:160px}
.header-search::placeholder{color:#475569}
.header-search:focus{border-color:rgba(124,58,237,0.5);background:rgba(124,58,237,0.05)}
.result-count{font-size:0.75rem;color:var(--muted);white-space:nowrap}

/* KPI + Charts combined flex row */
.kpi-charts{display:flex;gap:16px;margin-bottom:20px;align-items:stretch}
.kpis{display:flex;flex-direction:column;gap:8px;width:130px;flex-shrink:0}
.kpi{background:var(--glass);border:1px solid var(--border);border-radius:10px;backdrop-filter:blur(12px);padding:10px 12px;text-align:center;cursor:pointer;transition:border-color .2s,background .2s}
.kpi:hover{background:rgba(255,255,255,0.09);border-color:rgba(255,255,255,0.22)}
.kpi.active-kpi{border-color:var(--purple);background:rgba(124,58,237,0.12)}
.kpi-val{font-size:1.7rem;font-weight:700;line-height:1}
.kpi-lbl{font-size:0.62rem;color:var(--muted);margin-top:4px;text-transform:uppercase;letter-spacing:.07em}
.kpi.k-total .kpi-val{color:#e2e8f0}
.kpi.k-published .kpi-val{color:#4ade80}
.kpi.k-draft .kpi-val{color:#22d3ee}
.kpi.k-archived .kpi-val{color:#fbbf24}
.kpi.k-idea .kpi-val{color:#a78bfa}
.charts{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;flex:1;min-width:0}
.chart-card{background:var(--glass);border:1px solid var(--border);border-radius:12px;backdrop-filter:blur(12px);padding:16px}
.chart-title{font-size:0.72rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:12px}
.chart-inner{position:relative;height:190px}

/* Table */
.tbl-scroll{flex:1;min-height:0;overflow:auto;scrollbar-width:thin;scrollbar-color:#7c3aed rgba(255,255,255,0.05)}
.tbl-scroll::-webkit-scrollbar{height:7px;width:7px}
.tbl-scroll::-webkit-scrollbar-track{background:rgba(255,255,255,0.03);border-radius:0 0 12px 12px}
.tbl-scroll::-webkit-scrollbar-thumb{background:#7c3aed;border-radius:4px}
.tbl-scroll::-webkit-scrollbar-thumb:hover{background:#9f6cf0}
/* Full-viewport layout */
html,body{overflow:hidden;height:100%}
.wrap{display:flex;flex-direction:column;height:100%;padding:24px 16px 16px;overflow:hidden}
.tbl-wrap{flex:1;min-height:0;background:var(--glass);border:1px solid var(--border);border-radius:12px;backdrop-filter:blur(12px);display:flex;flex-direction:column}
/* Compact header transitions */
.kpi-charts{transition:max-height .3s ease,opacity .3s ease,margin-bottom .3s ease;max-height:600px;opacity:1}
body.compact .kpi-charts{max-height:0;overflow:hidden;margin-bottom:0;opacity:0;pointer-events:none}
table{width:100%;border-collapse:collapse;font-size:0.81rem;min-width:600px}
thead th{padding:11px 14px;text-align:left;font-weight:600;font-size:0.68rem;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);border-bottom:1px solid var(--border);white-space:nowrap;background:rgba(0,0,0,0.2)}
thead th.sortable{cursor:pointer;user-select:none}
thead th.sortable:hover{color:var(--text)}
.sort-icon{opacity:0.35;margin-left:4px;font-style:normal}
thead th.sorted .sort-icon{opacity:1;color:var(--purple)}
tbody tr{border-bottom:1px solid rgba(255,255,255,0.04);transition:background .15s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:rgba(124,58,237,0.06)}
td{padding:9px 14px;vertical-align:middle}
td.td-name{font-weight:500;max-width:280px}
td.td-name a{color:var(--text);text-decoration:none;display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
td.td-name a:hover{color:#c4b5fd}
td.td-muted{color:var(--muted)}

/* Badges */
.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:0.66rem;font-weight:600;white-space:nowrap;line-height:1.6}
.b-published{background:rgba(34,197,94,0.12);color:#4ade80;border:1px solid rgba(34,197,94,0.25)}
.b-draft{background:rgba(6,182,212,0.1);color:#22d3ee;border:1px solid rgba(6,182,212,0.25)}
.b-archived{background:rgba(245,158,11,0.1);color:#fbbf24;border:1px solid rgba(245,158,11,0.25)}
.b-idea{background:rgba(167,139,250,0.1);color:#a78bfa;border:1px solid rgba(167,139,250,0.25)}
.b-neutral{background:rgba(255,255,255,0.06);color:#94a3b8;border:1px solid rgba(255,255,255,0.1)}
.b-expiring{background:rgba(239,68,68,0.12);color:#f87171;border:1px solid rgba(239,68,68,0.25)}

/* Pagination */
.pagination{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-top:1px solid var(--border);flex-wrap:wrap;gap:8px}
.pagination span{font-size:0.76rem;color:var(--muted)}
.page-btns{display:flex;gap:6px;flex-wrap:wrap}
.page-btns button{background:rgba(255,255,255,0.04);border:1px solid var(--border);color:var(--text);padding:5px 12px;border-radius:6px;font-family:'Inter',sans-serif;font-size:0.76rem;cursor:pointer;transition:all .15s}
.page-btns button:hover:not(:disabled){border-color:rgba(124,58,237,0.5);background:rgba(124,58,237,0.1)}
.page-btns button:disabled{opacity:0.3;cursor:default}
.page-btns button.active{background:rgba(124,58,237,0.22);border-color:#7c3aed;color:#e2e8f0;font-weight:600}

/* File picker */
.filepick-row{text-align:left;max-width:420px;margin:0 auto}
.filepick-lbl{display:flex;align-items:center;justify-content:space-between;gap:16px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:8px;padding:12px 16px;cursor:pointer;transition:border-color .2s}
.filepick-lbl:hover{border-color:rgba(124,58,237,0.5)}
.filepick-lbl span{font-size:.82rem;color:#e2e8f0;font-weight:500}
.filepick-lbl input[type=file]{font-size:.75rem;color:#94a3b8}
.load-btn{margin-top:24px;padding:10px 28px;background:rgba(124,58,237,0.7);border:1px solid #7c3aed;border-radius:8px;color:#fff;font-family:'Inter',sans-serif;font-size:.85rem;font-weight:600;cursor:pointer;transition:all .2s}
.load-btn:hover:not(:disabled){background:rgba(124,58,237,0.9);box-shadow:0 0 16px rgba(124,58,237,0.4)}
.load-btn:disabled{opacity:.35;cursor:default}

/* Loading / empty */
.loading{text-align:center;padding:70px 24px;color:var(--muted)}
.spinner{width:30px;height:30px;border:2px solid rgba(124,58,237,0.2);border-top-color:#7c3aed;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
.err{color:#f87171}

/* Clickable cells */
td.filterable{cursor:pointer;transition:background .15s}
td.filterable:hover{background:rgba(124,58,237,0.12)}

/* Active filter chips */
.chip-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;min-height:0}
.chip{display:inline-flex;align-items:center;gap:6px;padding:3px 10px 3px 12px;border-radius:20px;font-size:.72rem;font-weight:600;background:rgba(124,58,237,0.2);border:1px solid rgba(124,58,237,0.45);color:#c4b5fd;cursor:default}
.chip-x{cursor:pointer;opacity:.7;font-size:.8rem;line-height:1;padding:0 2px}
.chip-x:hover{opacity:1;color:#fff}

/* Star */
.star{color:#f59e0b}

/* Column header filter button */
.th-filter-btn{cursor:pointer;opacity:.4;padding:1px 3px;border-radius:3px;border:1px solid transparent;background:none;color:inherit;font-family:inherit;font-size:.7rem;line-height:1;vertical-align:middle;margin-left:3px;transition:opacity .15s,border-color .15s}
.th-filter-btn:hover{opacity:1;border-color:rgba(124,58,237,0.5);background:rgba(124,58,237,0.1)}
.th-filter-btn.active{opacity:1;color:#a78bfa;border-color:rgba(167,139,250,0.5);background:rgba(167,139,250,0.12)}

/* Reviewer status icons */
.rev-done{color:#4ade80;font-size:.95rem}
.rev-prog{color:#fbbf24;font-size:.95rem}
.rev-open{color:#334155;font-size:.95rem}

/* Fade in */
.fade-in{animation:fadeIn .4s ease both}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>

<div class="wrap">

</div>

<script>

// ── Excel loading ──────────────────────────────────────────────────────
function parseExcel(ab){
  var wb=XLSX.read(ab,{type:'array',cellDates:true});
  return XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:''});
}

async function loadExcel(path){
  var resp=await fetch(path);
  if(!resp.ok)throw new Error('Could not load '+path+' ('+resp.status+')');
  return parseExcel(await resp.arrayBuffer());
}

function readFileAsBuffer(file){
  return new Promise(function(resolve,reject){
    var fr=new FileReader();
    fr.onload=function(e){resolve(e.target.result);};
    fr.onerror=reject;
    fr.readAsArrayBuffer(file);
  });
}

function fmtDate(v){
  if(!v||v==='')return'';
  if(v instanceof Date&&!isNaN(v))return v.toLocaleDateString('de-DE');
  var s=String(v).trim();
  if(/^\d{2}\.\d{2}\.\d{4}$/.test(s))return s;
  var d=new Date(s);
  return isNaN(d)?s:d.toLocaleDateString('de-DE');
}

function toDate(v){
  if(!v||v==='')return null;
  if(v instanceof Date&&!isNaN(v))return v;
  var s=String(v).trim();
  if(/^\d{2}\.\d{2}\.\d{4}$/.test(s)){
    var p=s.split('.');return new Date(+p[2],+p[1]-1,+p[0]);
  }
  var d=new Date(s);return isNaN(d)?null:d;
}

function isExpiringSoon(v){
  var d=toDate(v);
  if(!d)return false;
  var diff=(d-Date.now())/(86400000);
  return diff>=0&&diff<=90;
}

// ── Init ───────────────────────────────────────────────────────────────
async function init(){
  // Try localStorage cache first
  try{
    var cached=localStorage.getItem('missions_cache');
    if(cached){
      var data=JSON.parse(cached);
      processData(data.portfolio,data.ucr,true);
      return;
    }
  }catch(e){}
  // Try fetch (works when served via HTTP)
  if(location.protocol!=='file:'){
    try{
      var results=await Promise.all([
        loadExcel('Mission_Portfolio.xlsx'),
        loadExcel('missions_ucr.xlsx')
      ]);
      saveCache(results[0],results[1]);
      processData(results[0],results[1]);
      return;
    }catch(e){}
  }
  showFilePicker();
}

function saveCache(portfolio,ucr){
  try{localStorage.setItem('missions_cache',JSON.stringify({portfolio:portfolio,ucr:ucr}));}catch(e){}
}

function clearCache(){
  localStorage.removeItem('missions_cache');
  allMissions=[];filtered=[];
  activeStatus='';activeCategory='';
  showFilePicker();
}

function showFilePicker(){
  document.getElementById('tableArea').innerHTML=
    '<div class="loading" id="pickArea">'
    +'<div style="font-size:1rem;font-weight:600;color:#e2e8f0;margin-bottom:6px">Select Excel files to load</div>'
    +'<div style="font-size:.8rem;color:#94a3b8;margin-bottom:24px">Files are remembered in this browser after first load</div>'
    +'<div class="filepick-row"><label class="filepick-lbl"><span>Mission_Portfolio.xlsx</span>'
    +'<input type="file" id="pickPortfolio" accept=".xlsx,.xls" onchange="checkPicks()"></label></div>'
    +'<div class="filepick-row" style="margin-top:12px"><label class="filepick-lbl"><span>missions_ucr.xlsx</span>'
    +'<input type="file" id="pickUCR" accept=".xlsx,.xls" onchange="checkPicks()"></label></div>'
    +'<button id="loadBtn" class="load-btn" onclick="loadFromFiles()" disabled>Load &amp; Remember</button>'
    +'</div>';
}

function checkPicks(){
  var ok=document.getElementById('pickPortfolio').files.length>0
      &&document.getElementById('pickUCR').files.length>0;
  document.getElementById('loadBtn').disabled=!ok;
}

async function loadFromFiles(){
  try{
    var ab1=await readFileAsBuffer(document.getElementById('pickPortfolio').files[0]);
    var ab2=await readFileAsBuffer(document.getElementById('pickUCR').files[0]);
    var p=parseExcel(ab1), u=parseExcel(ab2);
    saveCache(p,u);
    processData(p,u);
  }catch(e){
    document.getElementById('tableArea').innerHTML=
      '<div class="loading"><div class="err">Failed to read files: '+e.message+'</div></div>';
  }
}

function processData(portfolio,ucr){
    var ucrMap=new Map();
    ucr.forEach(function(r){
      var id=String(r['ID']||'').trim();
      if(id)ucrMap.set(id,r);
    });

    allMissions=portfolio.map(function(r){
      var ucrId=String(r['UCR ID']||'').trim();
      var ucr=ucrMap.get(ucrId)||null;
      var coach=String(r['Coach name(s)']||ucr&&ucr['Coach']||'').trim();
      var expiry=ucr?ucr['Expiry Date']:null;
      var revLang=(function(){
        if(String(r['Date UA']||'').trim())return'done';
        if(String(r['Name UA']||r['Review by UA']||'').trim())return'inprogress';
        return'open';
      })();
      var revQual=(function(){
        var q=String(r['Quality Review completed (yes/no)']||'').trim().toLowerCase();
        if(q==='yes')return'done';
        if(q&&q!=='no')return'inprogress';
        return'open';
      })();
      var revPM=(function(){
        if(String(r['Date PE']||'').trim())return'done';
        if(String(r['Name PE']||r['Review by Platform Exp.']||'').trim())return'inprogress';
        return'open';
      })();
      return Object.assign({},r,{_ucr:ucr,_coach:coach,_ucr_expiry:expiry||'',_rev_lang:revLang,_rev_qual:revQual,_rev_pm:revPM});
    }).filter(function(r){return r['Mission Name']||r['Mission ID']||r['Nr'];});
    renderKPIs();
    renderCharts();
    applyFilters();
}

// ── KPIs ───────────────────────────────────────────────────────────────
function renderKPIs(){
  var counts={published:0,draft:0,Archived:0,idea:0};
  allMissions.forEach(function(m){var s=String(m['STATUS']||'');if(s in counts)counts[s]++;});
  document.getElementById('kv-total').textContent=allMissions.length;
  document.getElementById('kv-published').textContent=counts.published;
  document.getElementById('kv-draft').textContent=counts.draft;
  document.getElementById('kv-archived').textContent=counts.Archived;
  document.getElementById('kv-idea').textContent=counts.idea;
}

// ── Charts ─────────────────────────────────────────────────────────────
function renderCharts(){
  Chart.defaults.color='#94a3b8';

  // Status donut
  var statusCounts=STATUS_ORDER.map(function(s){
    return allMissions.filter(function(m){return String(m['STATUS']||'')===s;}).length;
  });
  statusChart=new Chart(document.getElementById('statusChart'),{
    type:'doughnut',
    data:{
      labels:STATUS_ORDER,
      datasets:[{
        data:statusCounts,
        backgroundColor:STATUS_ORDER.map(function(s){return STATUS_COLORS[s]||'rgba(148,163,184,0.5)';}),
        borderColor:'rgba(0,0,0,0)',
        hoverOffset:6
      }]
    },
    options:{
      responsive:true,maintainAspectRatio:false,cutout:'68%',
      onClick:function(e,els){
        if(!els.length)return;
        var st=STATUS_ORDER[els[0].index];
        filterKPI(activeStatus===st?'':st);
      },
      plugins:{
        legend:{position:'right',labels:{color:'#94a3b8',font:{size:11,family:'Inter'},padding:14,boxWidth:12}},
        tooltip:{callbacks:{label:function(ctx){return' '+ctx.label+': '+ctx.parsed;}}}
      }
    }
  });

  // Category bar (top 12)
  var catCounts={};
  allMissions.forEach(function(m){var c=String(m['Category']||'').trim()||'(none)';catCounts[c]=(catCounts[c]||0)+1;});
  var catSorted=Object.entries(catCounts).sort(function(a,b){return b[1]-a[1];}).slice(0,12);

  categoryChart=new Chart(document.getElementById('categoryChart'),{
    type:'bar',
    data:{
      labels:catSorted.map(function(e){return e[0];}),
      datasets:[{
        data:catSorted.map(function(e){return e[1];}),
        backgroundColor:'rgba(124,58,237,0.55)',
        borderColor:'rgba(124,58,237,0.85)',
        borderWidth:1,borderRadius:4,
        hoverBackgroundColor:'rgba(124,58,237,0.8)'
      }]
    },
    options:{
      responsive:true,maintainAspectRatio:false,indexAxis:'y',
      onClick:function(e,els){
        if(!els.length)return;
        var cat=catSorted[els[0].index][0];
        activeCategory=(activeCategory===(cat==='(none)'?'':cat)?'':cat==='(none)'?'':cat);
        applyFilters();
      },
      plugins:{
        legend:{display:false},
        tooltip:{callbacks:{label:function(ctx){return' '+ctx.parsed.x+' missions';}}}
      },
      scales:{
        x:{ticks:{color:'#94a3b8',font:{size:10}},grid:{color:'rgba(255,255,255,0.05)'},border:{color:'transparent'}},
        y:{ticks:{color:'#e2e8f0',font:{size:10,family:'Inter'}},grid:{display:false},border:{color:'transparent'}}
      }
    }
  });

  // Coach bar chart
  var coachCounts={};
  allMissions.forEach(function(m){
    var c=String(m['Coach name(s)']||m._ucr&&m._ucr['Coach']||'').trim();
    if(c)coachCounts[c]=(coachCounts[c]||0)+1;
  });
  var coachSorted=Object.entries(coachCounts).sort(function(a,b){return b[1]-a[1];});
  if(coachChart)coachChart.destroy();
  coachChart=new Chart(document.getElementById('coachChart'),{
    type:'bar',
    data:{
      labels:coachSorted.map(function(e){return e[0];}),
      datasets:[{
        data:coachSorted.map(function(e){return e[1];}),
        backgroundColor:coachSorted.map(function(e){return activeCoach===e[0]?'rgba(6,182,212,0.85)':'rgba(6,182,212,0.45)';}),
        borderColor:coachSorted.map(function(e){return activeCoach===e[0]?'rgba(6,182,212,1)':'rgba(6,182,212,0.7)';}),
        borderWidth:1,borderRadius:4,
        hoverBackgroundColor:'rgba(6,182,212,0.75)'
      }]
    },
    options:{
      responsive:true,maintainAspectRatio:false,indexAxis:'y',
      onClick:function(e,els){
        if(!els.length)return;
        var name=coachSorted[els[0].index][0];
        setCoach(activeCoach===name?'':name);
      },
      plugins:{
        legend:{display:false},
        tooltip:{callbacks:{label:function(ctx){return' '+ctx.parsed.x+' mission'+(ctx.parsed.x!==1?'s':'');}}}
      },
      scales:{
        x:{ticks:{color:'#94a3b8',font:{size:10}},grid:{color:'rgba(255,255,255,0.05)'},border:{color:'transparent'}},
        y:{ticks:{color:'#e2e8f0',font:{size:11,family:'Inter'}},grid:{display:false},border:{color:'transparent'}}
      }
    }
  });
}

// ── Coach filter ───────────────────────────────────────────────────────
function setCoach(name){
  activeCoach=name;
  // Rebuild coach chart colors to highlight active
  if(coachChart){
    var coachCounts={};
    allMissions.forEach(function(m){
      var c=String(m['Coach name(s)']||m._ucr&&m._ucr['Coach']||'').trim();
      if(c)coachCounts[c]=(coachCounts[c]||0)+1;
    });
    var coachSorted=Object.entries(coachCounts).sort(function(a,b){return b[1]-a[1];});
    coachChart.data.datasets[0].backgroundColor=coachSorted.map(function(e){return activeCoach===e[0]?'rgba(6,182,212,0.85)':'rgba(6,182,212,0.45)';});
    coachChart.data.datasets[0].borderColor=coachSorted.map(function(e){return activeCoach===e[0]?'rgba(6,182,212,1)':'rgba(6,182,212,0.7)';});
    coachChart.update();
  }
  applyFilters();
}

// ── KPI tile filter ────────────────────────────────────────────────────
function filterKPI(status){
  activeStatus=status;
  document.querySelectorAll('.kpi').forEach(function(el){el.classList.remove('active-kpi');});
  var map={'':'k-total','published':'k-published','draft':'k-draft','Archived':'k-archived','idea':'k-idea'};
  var cls=map[status];
  if(cls)document.querySelector('.kpi.'+cls).classList.add('active-kpi');
  applyFilters();
}

// ── Cell click filter ──────────────────────────────────────────────────
function filterByCell(col, value){
  if(col==='STATUS'){
    filterKPI(activeStatus===value?'':value);
    return;
  } else if(col==='Category'){
    activeCategory=activeCategory===value?'':value;
  } else if(col==='Author'||col==='ucrStatus'){
    document.getElementById('search').value=value;
  } else if(col==='_coach'){
    setCoach(value);
    return;
  }
  applyFilters();
}

function renderChips(){
  var chips=[];
  var q=document.getElementById('search').value.trim();
  if(activeStatus) chips.push({label:'Status: '+activeStatus, clear:function(){filterKPI('');}});
  if(activeCategory) chips.push({label:'Category: '+activeCategory, clear:function(){activeCategory='';applyFilters();}});
  if(activeCoach) chips.push({label:'Coach: '+activeCoach, clear:function(){setCoach('');}});
  if(q) chips.push({label:'Search: '+q, clear:function(){document.getElementById('search').value='';applyFilters();}});
  var row=document.getElementById('chipRow');
  if(!chips.length){row.innerHTML='';return;}
  row.innerHTML=chips.map(function(c,i){
    return '<span class="chip">'+escHtml(c.label)+'<span class="chip-x" onclick="clearChip('+i+')">✕</span></span>';
  }).join('');
  // store clear fns
  row._clears=chips.map(function(c){return c.clear;});
}

function clearChip(i){
  var row=document.getElementById('chipRow');
  if(row._clears&&row._clears[i])row._clears[i]();
}

// ── Filters ────────────────────────────────────────────────────────────
function applyFilters(){
  var q=document.getElementById('search').value.toLowerCase().trim();

  filtered=allMissions.filter(function(m){
    if(activeStatus&&String(m['STATUS']||'').trim()!==activeStatus)return false;
    if(activeCategory&&String(m['Category']||'').trim()!==activeCategory)return false;
    if(activeCoach){var c=String(m['Coach name(s)']||m._ucr&&m._ucr['Coach']||'').trim();if(c!==activeCoach)return false;}
    if(q){
      var hay=[m['Mission Name'],m['Author'],m['Tags'],m['Mission ID'],m['Category'],m['Mission Description'],m['_coach']]
        .join(' ').toLowerCase();
      if(!hay.includes(q))return false;
    }
    return true;
  });

  if(sortCol)doSort();
  curPage=1;
  document.getElementById('resultCount').textContent=filtered.length+' mission'+(filtered.length!==1?'s':'');
  renderChips();
  renderTable();
}

// ── Sort ───────────────────────────────────────────────────────────────
function doSort(){
  filtered.sort(function(a,b){
    var av=a[sortCol]||'', bv=b[sortCol]||'';
    var ad=toDate(av), bd=toDate(bv);
    if(ad&&bd)return(ad-bd)*sortDir;
    av=String(av).toLowerCase(); bv=String(bv).toLowerCase();
    return(av<bv?-1:av>bv?1:0)*sortDir;
  });
}

function setSort(col){
  if(sortCol===col)sortDir*=-1; else{sortCol=col;sortDir=1;}
  doSort();
  curPage=1;
  renderTable();
}

// ── Table ──────────────────────────────────────────────────────────────
var COLS=[
  {key:'Mission Name',label:'Mission',tdClass:'td-name',sortable:true},
  {key:'_coach',label:'Coach',sortable:true,filterCol:'coach'},
  {key:'Category',label:'Category',sortable:true},
  {key:'STATUS',label:'Status',sortable:true,filterCol:'status'},
  {key:'_ucr_status',label:'Status (UCR)',sortable:false},
  {key:'UCR ID',label:'UCR',sortable:true},
  {key:'Author',label:'Author',sortable:true,tdClass:'td-muted'},
  {key:'Committed Date',label:'Committed',sortable:true,tdClass:'td-muted'},
  {key:'_ucr_expiry',label:'Expiry',sortable:true},
  {key:'Featured Mission?',label:'★',sortable:false},
  {key:'_rev_lang',label:'Lang Rev',sortable:false},
  {key:'_rev_qual',label:'Qual Rev',sortable:false},
  {key:'_rev_pm',label:'PM Rev',sortable:false},
  {key:'_dc_link',label:'DC',sortable:false}
];

function badgeStatus(s){
  var map={published:'b-published',draft:'b-draft',Archived:'b-archived',idea:'b-idea'};
  var s2=String(s||'').trim();
  return s2?'<span class="badge '+(map[s2]||'b-neutral')+'">'+s2+'</span>':'<span style="color:#334155">—</span>';
}

function renderTable(){
  var rows=filtered;

  if(!rows.length){
    document.getElementById('tableArea').innerHTML='<div class="loading" style="padding:40px">No missions match your filters.</div>';
    document.getElementById('pagination').style.display='none';
    return;
  }

  var html='<table><thead><tr>';
  COLS.forEach(function(c){
    var isActive=sortCol===c.key;
    var isFiltered=c.filterCol==='status'?!!activeStatus:c.filterCol==='coach'?!!activeCoach:false;
    var thClass=c.sortable?' class="sortable'+(isActive?' sorted':'')+'"':'';
    var thClick=c.sortable?' onclick="setSort(\''+c.key+'\')"':'';
    var icon=c.sortable?'<i class="sort-icon">'+(isActive?(sortDir===1?'↑':'↓'):'↕')+'</i>':'';
    var filterBtn=c.filterCol?'<button class="th-filter-btn'+(isFiltered?' active':'')+'" title="Filter" onclick="openColFilter(\''+c.filterCol+'\',this,event)">▾</button>':'';
    html+='<th'+thClass+thClick+' style="position:relative">'+c.label+icon+filterBtn+'</th>';
  });
  html+='</tr></thead><tbody>';

  rows.forEach(function(m){
    var link=String(m['Link to Discovery Center']||m['Link in Mission Manager']||'').trim();
    var name=String(m['Mission Name']||'(unnamed)').trim();
    var nameCell=link?'<a href="'+link+'" target="_blank" rel="noopener">'+escHtml(name)+'</a>':escHtml(name);

    var ucrStatus=m._ucr?String(m._ucr['Status']||'').trim():'';
    var expiry=m._ucr?m._ucr['Expiry Date']:null;
    var expSoon=isExpiringSoon(expiry);
    var expStr=fmtDate(expiry);
    var expCell=expSoon
      ?'<span class="badge b-expiring">'+expStr+'</span>'
      :(expStr?'<span class="td-muted" style="color:#94a3b8">'+expStr+'</span>':'<span style="color:#334155">—</span>');

    var ucrId=String(m['UCR ID']||'').trim();
    var ucrLink=ucrId
      ?'<a href="https://ucr.cfapps.eu10-004.hana.ondemand.com/#/UseCase/view/'+ucrId+'" target="_blank" rel="noopener" style="color:#22d3ee;font-size:.75rem">'+ucrId+'</a>'
      :'<span style="color:#334155">—</span>';

    var coach=String(m['Coach name(s)']||m._ucr&&m._ucr['Coach']||'').trim();
    var coachCell=coach?escHtml(coach):'<span style="color:#334155">—</span>';

    var featured=String(m['Featured Mission?']||'').toLowerCase();
    var isFeatured=featured==='yes'||featured==='true'||featured==='x'||featured==='1';

    var valInfo=VAL_MAP[ucrId]||null;
    var valCell=valInfo
      ?'<a href="https://jira.tools.sap/browse/'+escHtml(valInfo.key)+'" target="_blank" rel="noopener" style="text-decoration:none;display:block"><span class="badge '+valBadgeClass(valInfo.status)+'">'+escHtml(valInfo.key.replace('DISCOVALIDATION-','#'))+'&nbsp;'+escHtml(valInfo.status)+'</span>'
        +(valInfo.assignee?'<br><span style="font-size:.65rem;color:#94a3b8">'+escHtml(valInfo.assignee)+'</span>':'')
      +'</a>'
      :'<span style="color:#334155">—</span>';

    var cat=String(m['Category']||'').trim();
    var author=String(m['Author']||'').trim();

    html+='<tr>'
      +'<td class="td-name">'+nameCell+'</td>'
      +'<td class="td-muted filterable" title="Filter by coach" onclick="filterByCell(\'_coach\',\''+escHtml(coach)+'\')" style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+coachCell+'</td>'
      +'<td class="filterable" title="Filter by category" onclick="filterByCell(\'Category\',\''+escHtml(cat)+'\')">'+(cat||'<span style="color:#334155">—</span>')+'</td>'
      +'<td class="filterable" title="Filter by status" onclick="filterByCell(\'STATUS\',\''+escHtml(String(m['STATUS']||'').trim())+'\')">'+(badgeStatus(m['STATUS']))+'</td>'
      +'<td class="filterable" title="Filter by UCR status" onclick="filterByCell(\'ucrStatus\',\''+escHtml(ucrStatus)+'\')">'+(ucrStatus?'<span class="badge b-neutral">'+escHtml(ucrStatus)+'</span>':'<span style="color:#334155">—</span>')+'</td>'
      +'<td style="white-space:nowrap">'+ucrLink+'</td>'
      +'<td class="td-muted filterable" title="Filter by author" onclick="filterByCell(\'Author\',\''+escHtml(author)+'\')">'+escHtml(author||'—')+'</td>'
      +'<td class="td-muted" style="white-space:nowrap">'+fmtDate(m['Committed Date'])+'</td>'
      +'<td style="white-space:nowrap">'+expCell+'</td>'
      +'<td style="text-align:center">'+(isFeatured?'<span class="star">★</span>':'')+'</td>'
      +'<td style="white-space:nowrap">'+revIcon(m._rev_lang,m['Name UA']||m['Review by UA'])+'</td>'
      +'<td style="white-space:nowrap">'+valCell+'</td>'
      +'<td style="text-align:center">'+revIcon(m._rev_pm,m['Name PE']||m['Review by Platform Exp.'])+'</td>'
      +'<td style="text-align:center">'+(link?'<a href="'+escHtml(link)+'" target="_blank" rel="noopener" title="Open in Discovery Center" style="color:#22d3ee;font-size:.85rem;text-decoration:none">↗</a>':'<span style="color:#334155">—</span>')+'</td>'
      +'</tr>';
  });

  html+='</tbody></table>';
  document.getElementById('tableArea').innerHTML=html;
  initCompactScroll();
  document.getElementById('pagination').style.display='none';
}

function renderPagination(){
  var total=filtered.length, pages=Math.ceil(total/PAGE_SIZE);
  var pg=document.getElementById('pagination');
  if(pages<=1){pg.style.display='none';return;}
  pg.style.display='flex';
  document.getElementById('pageInfo').textContent=
    'Showing '+((curPage-1)*PAGE_SIZE+1)+'–'+Math.min(curPage*PAGE_SIZE,total)+' of '+total;

  var html='<button onclick="goPage('+(curPage-1)+')" '+(curPage===1?'disabled':'')+'>← Prev</button>';
  var lo=Math.max(1,curPage-2), hi=Math.min(pages,lo+4);
  if(hi-lo<4)lo=Math.max(1,hi-4);
  for(var i=lo;i<=hi;i++)
    html+='<button onclick="goPage('+i+')" class="'+(i===curPage?'active':'')+'">'+i+'</button>';
  html+='<button onclick="goPage('+(curPage+1)+')" '+(curPage===pages?'disabled':'')+'>Next →</button>';
  document.getElementById('pageBtns').innerHTML=html;
}

function goPage(p){curPage=p;renderTable();}

function initCompactScroll(){
  var ts=document.querySelector('.tbl-scroll');
  if(!ts||ts._compactBound)return;
  ts._compactBound=true;
  ts.addEventListener('scroll',function(){
    document.body.classList.toggle('compact',this.scrollTop>30);
  });
}

function valBadgeClass(s){
  if(s==='Completed')return 'b-published';
  if(s==='Consumed')return 'b-draft';
  if(s==='Inactive')return 'b-archived';
  return 'b-idea';
}

function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ── Reviewer icon ──────────────────────────────────────────────────────
function revIcon(status, tooltipVal){
  var tt=String(tooltipVal||'').trim();
  if(status==='done')return'<span class="rev-done" title="'+(tt?escHtml(tt):'Done')+'">●</span>';
  if(status==='inprogress')return'<span class="rev-prog" title="'+(tt?escHtml(tt):'In Progress')+'">◑</span>';
  return'<span class="rev-open" title="Open">○</span>';
}

// ── Column header filter dropdown ──────────────────────────────────────
function openColFilter(col, btn, event){
  event.stopPropagation();
  var drop=document.getElementById('colFilterDrop');
  var rect=btn.getBoundingClientRect();
  var options=[];
  if(col==='coach'){
    var seen={};
    allMissions.forEach(function(m){var c=String(m['Coach name(s)']||m._ucr&&m._ucr['Coach']||'').trim();if(c&&!seen[c]){seen[c]=true;options.push(c);}});
    options.sort(function(a,b){return a.localeCompare(b);});
    options.unshift('(All)');
  }else if(col==='status'){
    options=['(All)','published','draft','Archived','idea'];
  }
  drop.innerHTML=options.map(function(opt){
    var cur=col==='coach'?activeCoach:activeStatus;
    var isActive=(opt==='(All)'&&!cur)||(opt===cur&&opt!=='(All)');
    return'<button onclick="selectColFilter(\''+col+'\',\''+opt.replace(/'/g,"\\'")+'\')" style="display:block;width:100%;text-align:left;padding:6px 10px;border:none;background:'+(isActive?'rgba(124,58,237,0.25)':'none')+';color:'+(isActive?'#c4b5fd':'#e2e8f0')+';font-family:Inter,sans-serif;font-size:.78rem;cursor:pointer;border-radius:5px">'+(opt==='(All)'?'<span style="opacity:.6">⊘</span> All':escHtml(opt))+'</button>';
  }).join('');
  drop.style.left=rect.left+'px';
  drop.style.top=(rect.bottom+3)+'px';
  drop.style.display='block';
  colDropTarget=col;
}

function selectColFilter(col, val){
  document.getElementById('colFilterDrop').style.display='none';
  colDropTarget=null;
  if(col==='coach'){setCoach(val==='(All)'?'':val);}
  else if(col==='status'){filterKPI(val==='(All)'?'':val);}
}

document.addEventListener('click',function(e){
  var drop=document.getElementById('colFilterDrop');
  if(drop&&!drop.contains(e.target)){drop.style.display='none';colDropTarget=null;}
});

// Start
init();
</script>
</body>
